<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fund Wallet | Usman Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow border-0 mx-auto" style="max-width: 400px; border-radius: 20px;">
            <div class="card-body text-center">
                <h4 class="fw-bold">Fund Your Wallet</h4>
                <p class="text-muted">Transfer to the account below to fund your wallet instantly.</p>
                
                <div class="bg-primary text-white p-3 rounded-4 mb-3">
                    <small>Bank Name</small>
                    <h5 id="bankName">9PSB / Palmpay</h5>
                    <hr>
                    <small>Account Number</small>
                    <h2 class="fw-bold" id="accNo">Loading...</h2>
                </div>
                
                <p class="small text-danger text-start">Note: Automated funding attracts a ₦50 charge.</p>
                <a href="dashboard.html" class="btn btn-secondary w-100">Back to Dashboard</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
        apiKey: "AIzaSyAmJIfWsqFVHyP-F3W85u4UbbxANMQaOTw",
        authDomain: "usmandatasub-7f93c.firebaseapp.com",
        projectId: "usmandatasub-7f93c",
        storageBucket: "usmandatasub-7f93c.firebasestorage.app",
        messagingSenderId: "133797152161",
        appId: "1:133797152161:web:18ac35c888c901695377e0",
        databaseURL: "https://usmandatasub-7f93c-default-rtdb.firebaseio.com"
    };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onValue(ref(db, 'users/' + user.uid), (snapshot) => {
                    const data = snapshot.val();
                    // If you haven't generated virtual accounts yet, show instructions
                    document.getElementById('accNo').innerText = data.virtual_account || "Contact Admin";
                });
            }
        });
    </script>
</body>
</html>
