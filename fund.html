<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fund Wallet | Usman Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .fund-card { max-width: 500px; margin: 60px auto; border-radius: 28px; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; background: white; overflow: hidden; }
        .bank-box { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); color: white; padding: 35px 25px; text-align: center; position: relative; }
        .acc-number { font-size: 2.2rem; font-weight: 800; letter-spacing: 3px; font-family: monospace; margin: 15px 0 8px; }
        .acc-name { font-size: 1rem; font-weight: 600; text-transform: uppercase; opacity: 0.8; letter-spacing: 1px; }
        .copy-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 10px 24px; border-radius: 50px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .copy-btn:hover { background: white; color: #0f172a; }
        .info-list { padding: 30px 25px 25px; }
        .info-item { display: flex; align-items: center; gap: 15px; margin-bottom: 18px; color: #475569; font-size: 0.9rem; }
        .info-icon { background: #eff6ff; color: #1e3a8a; width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .btn-dark { background: #0f172a; border-radius: 50px; padding: 12px; font-weight: 600; transition: 0.3s; }
        .btn-dark:hover { background: #1e293b; transform: translateY(-2px); }
        .language-selector { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .language-selector select { padding: 8px 16px; border-radius: 30px; border: 1px solid #e2e8f0; background: white; font-weight: 500; }
    </style>
</head>
<body>

<div class="language-selector">
    <select id="langSwitcher" class="form-select">
        <option value="en">English</option>
        <option value="ha">Hausa</option>
    </select>
</div>

<div class="container">
    <div class="fund-card">
        <div class="bank-box" id="accBox">
            <div style="font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8;">
                <i class="fas fa-university me-1"></i> <span id="bankName">Loading Bank...</span>
            </div>
            <div class="acc-number" id="accNo">------</div>
            <div class="acc-name" id="accName">Loading Name...</div>
            <button class="copy-btn" id="copyBtn" onclick="copyAccount()">
                <i class="fas fa-copy me-2"></i><span id="copyBtnText">Copy Account Number</span>
            </button>
        </div>

        <div class="info-list">
            <div class="info-item">
                <div class="info-icon"><i class="fas fa-bolt"></i></div>
                <div><span id="info1">Transfers to this account are credited to your wallet instantly.</span></div>
            </div>
            <div class="info-item">
                <div class="info-icon"><i class="fas fa-coins"></i></div>
                <div><span id="info2">A standard bank fee of ₦50 is deducted for deposits below ₦10,000.</span></div>
            </div>
            <div class="info-item">
                <div class="info-icon"><i class="fas fa-shield-alt"></i></div>
                <div><span id="info3">This account is strictly dedicated to your wallet. Do not share it.</span></div>
            </div>

            <button class="btn btn-dark w-100 py-3 mt-3 fw-bold" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-arrow-left me-2"></i><span id="backBtn">Return to Dashboard</span>
            </button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAmJIfWsqFVHyP-F3W85u4UbbxANMQaOTw",
        authDomain: "usmandatasub-7f93c.firebaseapp.com",
        projectId: "usmandatasub-7f93c",
        storageBucket: "usmandatasub-7f93c.firebasestorage.app",
        messagingSenderId: "133797152161",
        appId: "1:133797152161:web:18ac35c888c901695377e0",
        databaseURL: "https://usmandatasub-7f93c-default-rtdb.firebaseio.com"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const translations = {
        en: { copyBtnText: "Copy Account Number", info1: "Transfers to this account are credited to your wallet instantly.", info2: "A standard bank fee of ₦50 is deducted for deposits below ₦10,000.", info3: "This account is strictly dedicated to your wallet. Do not share it.", backBtn: "Return to Dashboard" },
        ha: { copyBtnText: "Kwafi Lambar Asusu", info1: "Canja wuri zuwa wannan asusu yana ƙara kuɗi cikin walat ɗin ku nan take.", info2: "Ana cire kuɗin banki na ₦50 don ajiya ƙasa da ₦10,000.", info3: "Wannan asusu na walat ɗin ku ne kaɗai. Kada ku raba shi.", backBtn: "Koma Dashboard" }
    };

    const langSwitcher = document.getElementById('langSwitcher');
    function updateLanguage(lang) {
        const t = translations[lang];
        if (!t) return;
        document.getElementById('copyBtnText').innerText = t.copyBtnText;
        document.getElementById('info1').innerText = t.info1;
        document.getElementById('info2').innerText = t.info2;
        document.getElementById('info3').innerText = t.info3;
        document.getElementById('backBtn').innerText = t.backBtn;
    }
    langSwitcher.addEventListener('change', (e) => updateLanguage(e.target.value));
    updateLanguage('en');

    onAuthStateChanged(auth, (user) => {
        if (user) {
            onValue(ref(db, 'users/' + user.uid), (snapshot) => {
                const data = snapshot.val();
                if (data && data.virtual_account) {
                    document.getElementById('accNo').innerText = data.virtual_account;
                    document.getElementById('bankName').innerText = data.bank_name || "9PSB Bank";
                    document.getElementById('accName').innerText = data.fullName;
                    document.getElementById('copyBtn').style.display = "inline-block";
                } else {
                    document.getElementById('accNo').innerText = "NOT GENERATED";
                    document.getElementById('bankName').innerText = "Action Required";
                    document.getElementById('accName').innerText = "Please generate an account on the Dashboard.";
                    document.getElementById('copyBtn').style.display = "none";
                }
            });
        } else {
            window.location.href = "login.html";
        }
    });

    window.copyAccount = () => {
        const accNo = document.getElementById('accNo').innerText;
        if (accNo && accNo !== "NOT GENERATED" && accNo !== "------") {
            navigator.clipboard.writeText(accNo);
            const btn = document.getElementById('copyBtn');
            const btnText = document.getElementById('copyBtnText');
            const originalText = btnText.innerText;
            btnText.innerText = "Copied!";
            btn.style.background = "white";
            btn.style.color = "#0f172a";
            setTimeout(() => {
                btnText.innerText = originalText;
                btn.style.background = "rgba(255,255,255,0.15)";
                btn.style.color = "white";
            }, 2000);
        }
    };
</script>
</body>
</html>
