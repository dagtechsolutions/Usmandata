<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fund Wallet | Usman Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5 text-center">
        <div class="card shadow-sm border-0 mx-auto" style="max-width: 400px; border-radius: 20px;">
            <div class="card-body">
                <h4 class="fw-bold">Wallet Funding</h4>
                <p class="text-muted">Pay to the account below for instant funding.</p>
                <div id="accBox" class="bg-primary text-white p-4 rounded-4 mb-3">
                    <h2 id="accNo">---</h2>
                    <h5 id="bankName">Loading Bank...</h5>
                </div>
                <button class="btn btn-dark w-100" onclick="window.location.href='dashboard.html'">Back</button>
            </div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        const firebaseConfig = {
            apiKey: "AIzaSyAmJIfWsqFVHyP-F3W85u4UbbxANMQaOTw",
            authDomain: "usmandatasub-7f93c.firebaseapp.com",
            projectId: "usmandatasub-7f93c",
            storageBucket: "usmandatasub-7f93c.firebasestorage.app",
            messagingSenderId: "133797152161",
            appId: "1:133797152161:web:18ac35c888c901695377e0",
            databaseURL: "https://usmandatasub-7f93c-default-rtdb.firebaseio.com"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onValue(ref(db, 'users/' + user.uid), (snapshot) => {
                    const data = snapshot.val();
                    document.getElementById('accNo').innerText = data.virtual_account || "NOT GENERATED";
                    document.getElementById('bankName').innerText = data.bank_name || "Go to Dashboard to generate";
                });
            }
        });
    </script>
</body>
</html>
