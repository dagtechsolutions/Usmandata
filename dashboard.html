<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Usman Data Sub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f0f2f5; font-family: 'Inter', sans-serif; }
        .sidebar { background: #004a99; color: white; min-height: 100vh; padding: 20px; }
        .balance-card { background: linear-gradient(45deg, #004a99, #007bff); color: white; border-radius: 15px; padding: 30px; margin-bottom: 20px; }
        .service-btn { background: white; border: none; border-radius: 12px; padding: 20px; text-align: center; transition: 0.3s; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .service-btn:hover { transform: translateY(-5px); background: #f8f9fa; }
        .service-btn i { font-size: 2rem; color: #004a99; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar d-none d-md-block">
            <h4 class="fw-bold mb-4">USMAN DATA</h4>
            <hr>
            <p><i class="fas fa-home me-2"></i> Dashboard</p>
            <p><i class="fas fa-history me-2"></i> Transactions</p>
            <p id="btn-logout" style="cursor:pointer;"><i class="fas fa-sign-out-alt me-2"></i> Logout</p>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 id="txt-welcome">Barka da zuwa, <span id="userName">User</span></h3>
                <select id="langSwitcher" class="form-select w-auto">
                    <option value="en">English</option>
                    <option value="ha">Hausa</option>
                </select>
            </div>

            <!-- Wallet Card -->
            <div class="balance-card shadow">
                <p id="txt-balance-lbl">Available Balance / Ma'aji</p>
                <h1 class="fw-bold">₦<span id="userBalance">0.00</span></h1>
                <button class="btn btn-warning mt-2 fw-bold" onclick="fundWallet()">+ Add Money / Saka Kudi</button>
            </div>

            <!-- Services Grid -->
            <div class="row g-3">
                <div class="col-6 col-md-3">
                    <button class="service-btn" onclick="openModal('data')">
                        <i class="fas fa-wifi"></i><br><span class="srv-txt">Data</span>
                    </button>
                </div>
                <div class="col-6 col-md-3">
                    <button class="service-btn" onclick="openModal('airtime')">
                        <i class="fas fa-phone"></i><br><span class="srv-txt">Airtime</span>
                    </button>
                </div>
                <div class="col-6 col-md-3">
                    <button class="service-btn" onclick="openModal('nin')">
                        <i class="fas fa-id-card"></i><br><span class="srv-txt">NIN Search</span>
                    </button>
                </div>
                <div class="col-6 col-md-3">
                    <button class="service-btn" onclick="openModal('bills')">
                        <i class="fas fa-lightbulb"></i><br><span class="srv-txt">Bills/TV</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal for Services -->
<div class="modal fade" id="serviceModal" tabindex="-1 shadow">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Service</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- Forms will be injected here via JS -->
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { /* YOUR CONFIG HERE */ };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            // Fetch User Data from DB
            onValue(ref(db, 'users/' + user.uid), (snapshot) => {
                const data = snapshot.val();
                document.getElementById('userName').innerText = data.fullName;
                document.getElementById('userBalance').innerText = data.balance.toLocaleString();
            });
        } else {
            window.location.href = "login.html";
        }
    });

    // Logout
    document.getElementById('btn-logout').onclick = () => signOut(auth);

    // Function to handle Service Clicks
    window.openModal = (type) => {
        const myModal = new bootstrap.Modal(document.getElementById('serviceModal'));
        const body = document.getElementById('modalBody');
        
        if(type === 'data') {
            body.innerHTML = `
                <select id="network" class="form-select mb-3"><option>MTN</option><option>AIRTEL</option></select>
                <input type="number" id="phone" class="form-control mb-3" placeholder="Phone Number">
                <select id="plan" class="form-select mb-3"><option value="500">1GB - ₦250</option></select>
                <button class="btn btn-primary w-100" onclick="processService('data')">Buy Now</button>
            `;
        }
        if(type === 'nin') {
            body.innerHTML = `
                <input type="number" id="ninNum" class="form-control mb-3" placeholder="Enter NIN Number">
                <button class="btn btn-primary w-100" onclick="processService('nin')">Search (₦100)</button>
            `;
        }
        myModal.show();
    };
</script>
</body>
</html>
