<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Usman Data Sub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f4f6f9; font-family: 'Inter', sans-serif; }
        .sidebar { background: #004a99; color: white; min-height: 100vh; padding: 20px; position: sticky; top: 0; }
        .balance-card { background: linear-gradient(45deg, #004a99, #007bff); color: white; border-radius: 15px; padding: 30px; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,74,153,0.2); }
        .service-btn { background: white; border: none; border-radius: 15px; padding: 20px; text-align: center; transition: 0.3s; width: 100%; height: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .service-btn:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .service-btn i { font-size: 2rem; color: #004a99; margin-bottom: 10px; }
        .srv-name { font-weight: 600; font-size: 0.9rem; color: #333; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar d-none d-md-block">
            <h4 class="fw-bold mb-4">USMAN DATA</h4>
            <hr>
            <nav class="nav flex-column">
                <a class="nav-link text-white active" href="#"><i class="fas fa-home me-2"></i> Dashboard</a>
                <a class="nav-link text-white" href="#"><i class="fas fa-history me-2"></i> Transactions</a>
                <a class="nav-link text-white" href="#" id="btn-logout-side"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3><span id="txt-greet">Barka da zuwa</span>, <span id="userName" class="text-primary">User</span></h3>
                <div class="d-flex gap-2">
                    <select id="langSwitcher" class="form-select w-auto">
                        <option value="en">English</option>
                        <option value="ha">Hausa</option>
                    </select>
                    <span id="roleBadge" class="badge bg-dark d-flex align-items-center">Loading...</span>
                </div>
            </div>

            <div class="balance-card">
                <p id="txt-bal-lbl">Available Balance / Ma'aji</p>
                <h1 class="fw-bold">₦<span id="userBalance">0.00</span></h1>
                <button class="btn btn-warning mt-2 fw-bold" onclick="window.location.href='fund.html'">+ Add Money / Saka Kudi</button>
            </div>

            <div class="row g-3">
                <!-- Row 1 -->
                <div class="col-6 col-md-3"><button class="service-btn" onclick="openSrv('data')"><i class="fas fa-wifi"></i><br><span class="srv-name">Data</span></button></div>
                <div class="col-6 col-md-3"><button class="service-btn" onclick="openSrv('airtime')"><i class="fas fa-phone"></i><br><span class="srv-name">Airtime</span></button></div>
                <div class="col-6 col-md-3"><button class="service-btn" onclick="openSrv('nin')"><i class="fas fa-id-card"></i><br><span class="srv-name">NIN Search</span></button></div>
                <div class="col-6 col-md-3"><button class="service-btn" onclick="openSrv('bvn')"><i class="fas fa-university"></i><br><span class="srv-name">BVN Lookup</span></button></div>
                <!-- Row 2 -->
                <div class="col-6 col-md-3"><button class="service-btn" onclick="openSrv('tv')"><i class="fas fa-tv"></i><br><span class="srv-name">Cable TV</span></button></div>
                <div class="col-6 col-md-3"><button class="service-btn" onclick="openSrv('power')"><i class="fas fa-lightbulb"></i><br><span class="srv-name">Electricity</span></button></div>
                <div class="col-6 col-md-3"><button class="service-btn" onclick="openSrv('exam')"><i class="fas fa-graduation-cap"></i><br><span class="srv-name">Exam Pins</span></button></div>
                <div class="col-6 col-md-3"><button class="service-btn" onclick="openSrv('sms')"><i class="fas fa-envelope"></i><br><span class="srv-name">Bulk SMS</span></button></div>
            </div>
        </div>
    </div>
</div>

<!-- Service Modal -->
<div class="modal fade" id="srvModal" tabindex="-1 shadow">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0" style="border-radius:20px;">
      <div class="modal-header border-0"><h5 class="modal-title fw-bold" id="srvTitle">Service</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body" id="srvBody"></div>
    </div>
  </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAmJIfWsqFVHyP-F3W85u4UbbxANMQaOTw",
        authDomain: "usmandatasub-7f93c.firebaseapp.com",
        projectId: "usmandatasub-7f93c",
        storageBucket: "usmandatasub-7f93c.firebasestorage.app",
        messagingSenderId: "133797152161",
        appId: "1:133797152161:web:18ac35c888c901695377e0",
        databaseURL: "https://usmandatasub-7f93c-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const RENDER_URL = "https://usmandata.onrender.com";

    // --- FIX 1: USER STATE & UI UPDATES ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            onValue(ref(db, 'users/' + user.uid), (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('userName').innerText = data.fullName;
                    document.getElementById('userBalance').innerText = data.balance.toLocaleString('en-NG', { minimumFractionDigits: 2 });
                    document.getElementById('roleBadge').innerText = data.role.toUpperCase();
                }
            });
        } else { window.location.href = "login.html"; }
    });

    // --- FIX 2: THE GLOBAL MODAL MANAGER (Ensures NO omission of services) ---
    window.openSrv = (type) => {
        const modal = new bootstrap.Modal(document.getElementById('srvModal'));
        const body = document.getElementById('srvBody');
        const title = document.getElementById('srvTitle');
        
        let html = "";
        switch(type) {
            case 'data':
                title.innerText = "Buy Cheap Data";
                html = `<select id="net" class="form-select mb-3"><option value="mtn">MTN</option><option value="glo">GLO</option><option value="airtel">AIRTEL</option></select>
                        <input type="number" id="phone" class="form-control mb-3" placeholder="Phone Number">
                        <select id="plan" class="form-select mb-3"><option value="PSPLAN_1">1GB SME (₦250)</option><option value="PSPLAN_2">2GB SME (₦500)</option></select>`;
                break;
            case 'airtime':
                title.innerText = "Buy Airtime";
                html = `<select id="net" class="form-select mb-3"><option value="mtn">MTN</option><option value="glo">GLO</option></select>
                        <input type="number" id="phone" class="form-control mb-3" placeholder="Phone Number">
                        <input type="number" id="amt" class="form-control mb-3" placeholder="Amount (min ₦50)">`;
                break;
            case 'nin':
                title.innerText = "NIN Demographic Search";
                html = `<input type="number" id="ninVal" class="form-control mb-3" placeholder="Enter 11-digit NIN">`;
                break;
            case 'bvn':
                title.innerText = "BVN Lookup";
                html = `<input type="number" id="bvnVal" class="form-control mb-3" placeholder="Enter BVN Number">`;
                break;
            case 'tv':
                title.innerText = "Cable TV Subscription";
                html = `<select id="srv" class="form-select mb-3"><option value="gotv">GOTV</option><option value="dstv">DSTV</option></select>
                        <input type="number" id="iuc" class="form-control mb-3" placeholder="IUC/SmartCard Number">`;
                break;
            case 'power':
                title.innerText = "Electricity Bill";
                html = `<select id="disco" class="form-select mb-3"><option value="ikedc">Ikeja Electric</option><option value="aedc">Abuja Electric</option></select>
                        <input type="number" id="meter" class="form-control mb-3" placeholder="Meter Number">
                        <input type="number" id="amt" class="form-control mb-3" placeholder="Amount (₦)">`;
                break;
            case 'exam':
                title.innerText = "Exam Pin (WAEC/NECO)";
                html = `<select id="examType" class="form-select mb-3"><option value="waec">WAEC</option><option value="neco">NECO</option></select>
                        <input type="number" id="qty" class="form-control mb-3" value="1">`;
                break;
        }
        
        body.innerHTML = html + `<button class="btn btn-primary w-100 py-2 shadow" id="procBtn">Process Transaction</button>`;
        modal.show();

        // Attach the processing logic to the button inside the modal
        document.getElementById('procBtn').onclick = () => processRequest(type);
    };

    // --- FIX 3: THE UNIVERSAL BACKEND CALLER ---
    async function processRequest(type) {
        const uid = auth.currentUser.uid;
        const btn = document.getElementById('procBtn');
        btn.disabled = true; btn.innerText = "Processing... Please Wait";

        // Collect data based on type
        let payload = { uid, type };
        if(document.getElementById('net')) payload.network = document.getElementById('net').value;
        if(document.getElementById('phone')) payload.phone = document.getElementById('phone').value;
        if(document.getElementById('plan')) payload.plan = document.getElementById('plan').value;
        if(document.getElementById('ninVal')) payload.nin = document.getElementById('ninVal').value;
        if(document.getElementById('amt')) payload.amount = document.getElementById('amt').value;

        try {
            const response = await fetch(`${RENDER_URL}/api/process`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            alert(result.message || "Request Successful!");
        } catch (e) {
            alert("Connection Error: If this is the first request of the day, please wait 30 seconds for the server to wake up and try again.");
        }
        btn.disabled = false; btn.innerText = "Process Transaction";
    }

    // --- FIX 4: LOGOUT & FUNDING NAVIGATION ---
    window.fundWallet = () => {
        window.location.href = "fund.html";
    };

    document.getElementById('btn-logout').onclick = () => {
        signOut(auth).then(() => window.location.href = "login.html");
    };
</script>
</body>
</html>
