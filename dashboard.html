<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Usman Data Sub</title>
    <!-- FIX: Load Bootstrap in HEAD to avoid "not defined" errors -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f4f6f9; font-family: 'Inter', sans-serif; }
        .sidebar { background: #004a99; color: white; min-height: 100vh; padding: 20px; position: sticky; top: 0; }
        .balance-card { background: linear-gradient(45deg, #004a99, #007bff); color: white; border-radius: 15px; padding: 30px; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,74,153,0.2); }
        .service-btn { background: white; border: none; border-radius: 15px; padding: 20px; text-align: center; transition: 0.3s; width: 100%; height: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; }
        .service-btn:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .service-btn i { font-size: 2rem; color: #004a99; margin-bottom: 10px; }
        .srv-name { font-weight: 600; font-size: 0.9rem; color: #333; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar d-none d-md-block">
            <h4 class="fw-bold mb-4">USMAN DATA</h4>
            <hr>
            <nav class="nav flex-column">
                <a class="nav-link text-white active" href="#"><i class="fas fa-home me-2"></i> Dashboard</a>
                <a class="nav-link text-white" href="#" id="btn-logout"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
            </nav>
        </div>

        <div class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3>Hello, <span id="userName" class="text-primary text-capitalize">User</span></h3>
                <div class="d-flex gap-2">
                    <select id="langSwitcher" class="form-select w-auto">
                        <option value="en">English</option>
                        <option value="ha">Hausa</option>
                    </select>
                    <span id="roleBadge" class="badge bg-dark d-flex align-items-center">LOADING...</span>
                </div>
            </div>

            <div class="balance-card">
                <p>Available Balance / Ma'aji</p>
                <h1 class="fw-bold">₦<span id="userBalance">0.00</span></h1>
                <button class="btn btn-warning mt-2 fw-bold" onclick="window.location.href='fund.html'">+ Add Money / Saka Kudi</button>
            </div>

            <!-- Virtual Account Display -->
            <div class="card mb-4 border-0 shadow-sm p-3" id="vAccCard" style="border-radius: 15px;">
                <h6 class="fw-bold">Funding Account (Instant)</h6>
                <div id="vAccDisplay" class="text-muted small">Checking for account...</div>
            </div>

            <div class="row g-3">
                <div class="col-6 col-md-3"><button class="service-btn" onclick="openSrv('data')"><i class="fas fa-wifi"></i><br><span class="srv-name">Data</span></button></div>
                <div class="col-6 col-md-3"><button class="service-btn" onclick="openSrv('airtime')"><i class="fas fa-phone"></i><br><span class="srv-name">Airtime</span></button></div>
                <div class="col-6 col-md-3"><button class="service-btn" onclick="openSrv('nin')"><i class="fas fa-id-card"></i><br><span class="srv-name">NIN Search</span></button></div>
                <div class="col-6 col-md-3"><button class="service-btn" onclick="openSrv('bvn')"><i class="fas fa-university"></i><br><span class="srv-name">BVN Lookup</span></button></div>
                <div class="col-6 col-md-3"><button class="service-btn" onclick="openSrv('tv')"><i class="fas fa-tv"></i><br><span class="srv-name">Cable TV</span></button></div>
                <div class="col-6 col-md-3"><button class="service-btn" onclick="openSrv('power')"><i class="fas fa-lightbulb"></i><br><span class="srv-name">Electricity</span></button></div>
                <div class="col-6 col-md-3"><button class="service-btn" onclick="openSrv('exam')"><i class="fas fa-graduation-cap"></i><br><span class="srv-name">Exam Pins</span></button></div>
                <div class="col-6 col-md-3"><button class="service-btn" onclick="openSrv('sms')"><i class="fas fa-envelope"></i><br><span class="srv-name">Bulk SMS</span></button></div>
            </div>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="srvModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0" style="border-radius: 20px;">
      <div class="modal-header border-0"><h5 class="modal-title fw-bold" id="srvTitle">Service</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body" id="srvBody"></div>
    </div>
  </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAmJIfWsqFVHyP-F3W85u4UbbxANMQaOTw",
        authDomain: "usmandatasub-7f93c.firebaseapp.com",
        projectId: "usmandatasub-7f93c",
        storageBucket: "usmandatasub-7f93c.firebasestorage.app",
        messagingSenderId: "133797152161",
        appId: "1:133797152161:web:18ac35c888c901695377e0",
        databaseURL: "https://usmandatasub-7f93c-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const RENDER_URL = "https://usmandata.onrender.com";

    onAuthStateChanged(auth, (user) => {
        if (user) {
            onValue(ref(db, 'users/' + user.uid), (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('userName').innerText = data.fullName;
                    document.getElementById('userBalance').innerText = data.balance.toLocaleString('en-NG', {minimumFractionDigits: 2});
                    document.getElementById('roleBadge').innerText = data.role.toUpperCase();
                    
                    if(data.virtual_account) {
                        document.getElementById('vAccDisplay').innerHTML = `<h5 class="text-primary mb-0">${data.bank_name}</h5><h4 class="fw-bold">${data.virtual_account}</h4>`;
                    } else {
                        document.getElementById('vAccDisplay').innerHTML = `<button class="btn btn-sm btn-primary" onclick="window.genAcc()">Generate Funding Account</button>`;
                    }
                }
            });
        } else { window.location.href = "login.html"; }
    });

    window.openSrv = (type) => {
        const modal = new bootstrap.Modal(document.getElementById('srvModal'));
        const body = document.getElementById('srvBody');
        const title = document.getElementById('srvTitle');
        let html = "";

        if(type === 'data') {
            title.innerText = "Data Subscription";
            html = `<select id="n" class="form-select mb-2"><option value="mtn">MTN</option><option value="glo">GLO</option></select>
                    <input type="number" id="p" class="form-control mb-2" placeholder="Phone Number">
                    <select id="pl" class="form-select mb-2"><option value="PSPLAN_1">1GB SME (₦250)</option></select>`;
        } else if(type === 'nin') {
            title.innerText = "NIN Search";
            html = `<input type="number" id="ninVal" class="form-control mb-2" placeholder="11 Digit NIN">`;
        } // Add cases for power, tv, etc...

        body.innerHTML = html + `<button class="btn btn-primary w-100 mt-2" id="procBtn">Process</button>`;
        modal.show();
        document.getElementById('procBtn').onclick = () => window.processReq(type);
    };

    window.processReq = async (type) => {
        const uid = auth.currentUser.uid;
        const btn = document.getElementById('procBtn');
        btn.disabled = true; btn.innerText = "Processing...";
        
        const payload = { uid, type };
        if(document.getElementById('n')) payload.network = document.getElementById('n').value;
        if(document.getElementById('p')) payload.phone = document.getElementById('p').value;
        if(document.getElementById('ninVal')) payload.nin = document.getElementById('ninVal').value;

        try {
            const res = await fetch(`${RENDER_URL}/api/process`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const out = await res.json();
            alert(out.message);
        } catch(e) { alert("Server error. Try again."); }
        btn.disabled = false; btn.innerText = "Process";
    };

    window.genAcc = async () => {
        const res = await fetch(`${RENDER_URL}/api/gen-account`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ uid: auth.currentUser.uid })
        });
        const out = await res.json();
        alert(out.message);
    };

    document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => window.location.href="login.html");
</script>
</body>
</html>
