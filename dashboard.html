    <style>
        body { background: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #1e293b; }
        
        .sidebar { background: #0f172a; color: white; min-height: 100vh; padding: 20px; position: sticky; top: 0; box-shadow: 4px 0 15px rgba(0,0,0,0.05); }
        .nav-link-side { color: #94a3b8; font-weight: 600; padding: 12px 15px; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; display: block; text-decoration: none;}
        .nav-link-side:hover, .nav-link-side.active { background: rgba(255,255,255,0.1); color: #fff; }
        
        .balance-card { 
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); 
            color: white; border-radius: 20px; padding: 35px 30px; margin-bottom: 25px; 
            box-shadow: 0 15px 35px rgba(30, 58, 138, 0.2); position: relative; overflow: hidden;
        }
        .balance-card::after {
            content: '\f0d6'; font-family: 'Font Awesome 5 Free'; font-weight: 900;
            position: absolute; right: -20px; bottom: -30px; font-size: 10rem; opacity: 0.05; transform: rotate(-15deg);
        }
        .balance-card h1 { font-size: 3rem; font-weight: 800; letter-spacing: -1px; margin: 5px 0 15px 0;}
        
        /* Inline Tabs - Side by Side */
        .inline-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0;
        }
        .inline-tab {
            padding: 12px 28px;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            background: transparent;
            color: #64748b;
            transition: 0.3s;
            cursor: pointer;
            border-radius: 12px 12px 0 0;
            position: relative;
        }
        .inline-tab:hover { color: #0f172a; background: #f1f5f9; }
        .inline-tab.active {
            color: #047857;
            background: white;
            border-bottom: 3px solid #047857;
        }
        
        .service-btn { 
            background: white; border: 1px solid #e2e8f0; border-radius: 18px; padding: 25px 15px; 
            text-align: center; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            width: 100%; height: 100%; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .service-btn:hover { 
            transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); 
            border-color: #3b82f6; 
        }
        .icon-wrapper {
            width: 60px; height: 60px; border-radius: 15px; background: #eff6ff; color: #2563eb;
            display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin: 0 auto 15px;
        }
        .srv-name { font-weight: 700; font-size: 0.95rem; color: #334155; }
        
        .vacc-box { background: white; border: 1px solid #e2e8f0; border-left: 5px solid #10b981; border-radius: 15px; padding: 20px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);}
        
        .modal-content { border-radius: 24px; border: none; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .modal-header { background: #f8fafc; border-radius: 24px 24px 0 0; border-bottom: 1px solid #e2e8f0; padding: 20px 25px; }
        .form-control, .form-select { border-radius: 10px; padding: 12px 15px; border: 2px solid #e2e8f0; background: #f8fafc; font-weight: 500; }
        .form-control:focus, .form-select:focus { border-color: #3b82f6; background: white; box-shadow: none; }
        .loader { display: none; text-align: center; margin: 15px 0; color: #3b82f6; }
        #procBtn { border-radius: 12px; font-size: 1.1rem; padding: 14px; box-shadow: 0 4px 15px rgba(37,99,235,0.3); transition: 0.3s; }
        #procBtn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37,99,235,0.4); }
        
        /* Floating WhatsApp Icon */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            animation: pulse 2s infinite;
        }
        .whatsapp-float a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 65px;
            height: 65px;
            background: #25D366;
            color: white;
            border-radius: 50%;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4);
            transition: all 0.3s ease;
        }
        .whatsapp-float a:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 25px rgba(37, 211, 102, 0.5);
        }
        .whatsapp-float i {
            font-size: 2.5rem;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
/* Footer Styles */

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAmJIfWsqFVHyP-F3W85u4UbbxANMQaOTw",
        authDomain: "usmandatasub-7f93c.firebaseapp.com",
        projectId: "usmandatasub-7f93c",
        storageBucket: "usmandatasub-7f93c.firebasestorage.app",
        messagingSenderId: "133797152161",
        appId: "1:133797152161:web:18ac35c888c901695377e0",
        databaseURL: "https://usmandatasub-7f93c-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const RENDER_URL = "https://usmandata.onrender.com";

    window.activeService = {};

    // Tab switching logic
    const tabVending = document.getElementById('tabVending');
    const tabIdentity = document.getElementById('tabIdentity');
    const tabCards = document.getElementById('tabCards');
    const vendingContent = document.getElementById('vendingContent');
    const identityContent = document.getElementById('identityContent');
    const cardsContent = document.getElementById('cardsContent');
    
    tabVending.addEventListener('click', () => {
        tabVending.classList.add('active');
        tabIdentity.classList.remove('active');
        tabCards.classList.remove('active');
        vendingContent.style.display = 'block';
        identityContent.style.display = 'none';
        cardsContent.style.display = 'none';
    });
    
    tabIdentity.addEventListener('click', () => {
        tabIdentity.classList.add('active');
        tabVending.classList.remove('active');
        tabCards.classList.remove('active');
        identityContent.style.display = 'block';
        vendingContent.style.display = 'none';
        cardsContent.style.display = 'none';
    });
    
    tabCards.addEventListener('click', () => {
        tabCards.classList.add('active');
        tabVending.classList.remove('active');
        tabIdentity.classList.remove('active');
        cardsContent.style.display = 'block';
        vendingContent.style.display = 'none';
        identityContent.style.display = 'none';
    });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            onValue(ref(db, 'users/' + user.uid), (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('userName').innerText = data.fullName || "User";
                    const bal = parseFloat(data.balance);
                    document.getElementById('userBalance').innerText = isNaN(bal) ? "0.00" : bal.toLocaleString('en-NG', {minimumFractionDigits: 2});
                    document.getElementById('roleBadge').innerText = (data.role || "user").toUpperCase();
                    
                    if(data.virtual_account) {
                        document.getElementById('vAccDisplay').innerHTML = `
                            <div style="background: linear-gradient(135deg, #f8fafc, #e2e8f0); padding: 15px; border-radius: 12px; border: 1px solid #cbd5e1; position: relative; overflow: hidden;">
                                <div style="position: absolute; right: -10px; top: -10px; opacity: 0.1;">
                                    <i class="fas fa-university" style="font-size: 5rem; color: #004a99;"></i>
                                </div>
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; position: relative; z-index: 2;">
                                    <span style="font-size: 0.85rem; color: #64748b; font-weight: bold; text-transform: uppercase;">${data.bank_name || "9PSB Bank"}</span>
                                    <span style="background: #dcfce7; color: #166534; font-size: 0.7rem; padding: 3px 8px; border-radius: 20px; font-weight: bold;"><i class="fas fa-bolt"></i> Auto-Funding</span>
                                </div>
                                <h3 style="color: #004a99; font-weight: 900; letter-spacing: 2px; margin: 0; font-family: monospace; position: relative; z-index: 2;">
                                    ${data.virtual_account}
                                </h3>
                            </div>
                        `;
                    } else {
                        document.getElementById('vAccDisplay').innerHTML = `
                            <div class="alert alert-warning p-2 mb-3" style="font-size:0.85rem; border-left: 4px solid #ffc107;">
                                <i class="fas fa-shield-alt text-danger"></i> <b>CBN KYC:</b> To generate an account, your registered name <b>(${data.fullName})</b> MUST match your BVN/NIN.
                            </div>
                            <div class="input-group mb-2 shadow-sm">
                                <select id="kycType" class="form-select bg-white fw-bold" style="max-width: 100px;">
                                    <option value="nin">NIN</option>
                                    <option value="bvn">BVN</option>
                                </select>
                                <input type="number" id="kycNumber" class="form-control" placeholder="Enter 11-digit number">
                            </div>
                            <button class="btn btn-primary w-100 fw-bold shadow-sm" id="btn-gen-acc" onclick="window.genAcc()">
                                <i class="fas fa-plus"></i> Generate Account
                            </button>
                        `;
                    }
                }
            });
        } else { window.location.href = "login.html"; }
    });

    // Open Service Function
    window.openSrv = (type) => {
        const modal = new bootstrap.Modal(document.getElementById('srvModal'));
        const body = document.getElementById('srvBody');
        const extra = document.getElementById('srvExtra');
        const title = document.getElementById('srvTitle');
        const btn = document.getElementById('procBtn');
        
        extra.innerHTML = "";
        btn.style.display = "block";
        btn.innerText = "Process Transaction";
        window.activeService = { type };

        // Vending Services
        if (type === 'data' || type === 'smile') {
            title.innerHTML = `<i class="fas fa-wifi text-primary"></i> ${type === 'data' ? 'Buy Data' : 'Smile Data'}`;
            body.innerHTML = `
                <select id="inp_network" class="form-select mb-3" onchange="window.fetchDataPlans()">
                    <option value="">Select Network...</option>
                    ${type === 'data' ? '<option value="mtn">MTN</option><option value="airtel">Airtel</option><option value="glo">GLO</option><option value="9mobile">9Mobile</option>' : '<option value="smile">Smile</option>'}
                </select>
                <select id="inp_plan" class="form-select mb-3"><option value="">Select Plan</option></select>
                <input type="number" id="inp_phone" class="form-control mb-3" placeholder="Recipient Phone Number">
            `;
            btn.onclick = () => window.executeTransaction();
        }
        else if (type === 'airtime') {
            title.innerHTML = '<i class="fas fa-phone text-warning"></i> Buy Airtime';
            body.innerHTML = `<select id="inp_network" class="form-select mb-3"><option value="mtn">MTN</option><option value="airtel">Airtel</option><option value="glo">GLO</option><option value="9mobile">9Mobile</option></select><input type="number" id="inp_amount" class="form-control mb-3" placeholder="Amount (₦)"><input type="number" id="inp_phone" class="form-control mb-3" placeholder="Phone Number">`;
            btn.onclick = () => window.executeTransaction();
        }
        else if (type === 'airtime_cash') {
            title.innerHTML = '<i class="fas fa-exchange-alt text-success"></i> Airtime to Wallet';
            body.innerHTML = `<select id="inp_network" class="form-select mb-3"><option value="mtn">MTN</option><option value="airtel">Airtel</option><option value="glo">GLO</option><option value="9mobile">9Mobile</option></select><input type="number" id="inp_amount" class="form-control mb-3" placeholder="Amount to Send (₦)"><input type="number" id="inp_phone" class="form-control mb-3" placeholder="Phone Number sending from">`;
            btn.onclick = () => window.executeTransaction();
        }
        else if (type === 'tv') {
            title.innerHTML = '<i class="fas fa-tv text-danger"></i> Cable TV';
            body.innerHTML = `<select id="inp_service" class="form-select mb-3" onchange="window.fetchTVPlans()"><option value="">Select Provider...</option><option value="dstv">DSTV</option><option value="gotv">GOTV</option><option value="startimes">Startimes</option></select><select id="inp_plan" class="form-select mb-3"><option value="">Select Bouquet</option></select><input type="number" id="inp_account" class="form-control mb-3" placeholder="IUC / Smartcard Number"><input type="number" id="inp_phone" class="form-control mb-3" placeholder="Customer Phone Number">`;
            btn.innerText = "Validate Smartcard";
            btn.onclick = () => window.validateMeterOrTV();
        }
        else if (type === 'power') {
            title.innerHTML = '<i class="fas fa-lightbulb text-warning"></i> Electricity';
            body.innerHTML = `<select id="inp_service" class="form-select mb-3"><option value="ikedc">Ikeja Electric</option><option value="ekedc">Eko Electric</option><option value="kano">Kano Electric</option><option value="phedc">Port Harcourt</option><option value="ibedc">Ibadan Electric</option><option value="abuja">Abuja Electric</option></select><select id="inp_meter_type" class="form-select mb-3"><option value="prepaid">Prepaid</option><option value="postpaid">Postpaid</option></select><input type="number" id="inp_account" class="form-control mb-3" placeholder="Meter Number"><input type="number" id="inp_amount" class="form-control mb-3" placeholder="Amount (₦)"><input type="number" id="inp_phone" class="form-control mb-3" placeholder="Customer Phone Number">`;
            btn.innerText = "Validate Meter";
            btn.onclick = () => window.validateMeterOrTV();
        }
        else if (type === 'exam') {
            title.innerHTML = '<i class="fas fa-graduation-cap text-primary"></i> Exam Pins';
            body.innerHTML = `<select id="inp_exam_id" class="form-select mb-3"><option value="">Loading Exams...</option></select><input type="number" id="inp_qty" class="form-control mb-3" placeholder="Quantity (e.g. 1)" value="1">`;
            window.fetchExamPins();
            btn.onclick = () => window.executeTransaction();
        }
        else if (type === 'sms') {
            title.innerHTML = '<i class="fas fa-envelope text-primary"></i> Bulk SMS';
            body.innerHTML = `<input type="text" id="inp_sender" class="form-control mb-3" placeholder="Sender ID (e.g. MySchool)" maxlength="11"><textarea id="inp_phone" class="form-control mb-3" rows="3" placeholder="Phone Numbers (Comma separated)" oninput="window.calcSmsCost()"></textarea><textarea id="inp_message" class="form-control mb-3" rows="4" placeholder="Type your message here..." oninput="window.calcSmsCost()"></textarea><div class="alert alert-info fw-bold text-center" id="smsCostPreview">Cost: ₦0.00</div>`;
            btn.onclick = () => window.executeTransaction();
        }
        else if (type === 'recharge_card') {
    title.innerHTML = '<i class="fas fa-print text-warning"></i> Print Recharge Card';
    body.innerHTML = `
        <select id="card_network" class="form-select mb-3">
            <option value="mtn">MTN</option>
            <option value="glo">GLO</option>
            <option value="airtel">Airtel</option>
            <option value="9mobile">9Mobile</option>
        </select>
        <input type="number" id="card_amount" class="form-control mb-3" placeholder="Amount (₦)" min="100">
        <input type="number" id="card_quantity" class="form-control mb-3" placeholder="Quantity" value="1" min="1">
        <div class="alert alert-info">
            <i class="fas fa-info-circle"></i> Recharge card pins will be displayed after payment
        </div>
    `;
    btn.innerText = "Generate & Print";
    btn.onclick = () => window.executeTransaction();
}
        // USD Card Services
        else if (type === 'usd_card') {
            title.innerHTML = '<i class="fas fa-dollar-sign text-warning"></i> Issue USD Virtual Card';
            body.innerHTML = `
                <div class="alert alert-info mb-3">
                    <i class="fas fa-info-circle"></i> Virtual USD Card for international payments
                </div>
                <select id="card_brand" class="form-select mb-3">
                    <option value="VISA">VISA</option>
                    <option value="MASTERCARD">Mastercard</option>
                </select>
                <input type="number" id="card_amount" class="form-control mb-3" placeholder="Initial Funding Amount (USD)" value="10">
                <small class="text-muted">Minimum $10 USD for card issuance</small>
            `;
            btn.innerText = "Issue USD Card";
            btn.onclick = () => window.executeTransaction();
        }
        else if (type === 'card_balance') {
            title.innerHTML = '<i class="fas fa-chart-line"></i> USD Card Balance';
            body.innerHTML = `<input type="text" id="card_id" class="form-control mb-3" placeholder="Enter Card ID (optional)">`;
            btn.innerText = "Check Balance";
            btn.onclick = () => window.executeTransaction();
        }
        else if (type === 'card_freeze') {
            title.innerHTML = '<i class="fas fa-snowflake"></i> Freeze/Unfreeze Card';
            body.innerHTML = `<input type="text" id="card_id" class="form-control mb-3" placeholder="Enter Card ID"><select id="freeze_action" class="form-select"><option value="freeze">Freeze Card</option><option value="unfreeze">Unfreeze Card</option></select>`;
            btn.innerText = "Apply";
            btn.onclick = () => window.executeTransaction();
        }
        else if (type === 'card_topup') {
            title.innerHTML = '<i class="fas fa-arrow-up"></i> Top-up USD Card';
            body.innerHTML = `<input type="text" id="card_id" class="form-control mb-3" placeholder="Enter Card ID"><input type="number" id="topup_amount" class="form-control mb-3" placeholder="Amount (USD)" min="5">`;
            btn.innerText = "Top-up Card";
            btn.onclick = () => window.executeTransaction();
        }
        // Identity Services (Humanity)
        else if (type === 'nin1' || type === 'nin2' || type === 'nin3') {
            title.innerHTML = `<i class="fas fa-id-card text-success"></i> ${type === 'nin1' ? 'NIN Search (v1)' : (type === 'nin2' ? 'NIN Search (v2)' : 'NIN Search (v3)')}`;
            body.innerHTML = `<input type="number" id="inp_kyc_num" class="form-control mb-3" placeholder="Enter 11 Digit NIN">`;
            btn.onclick = () => window.executeTransaction();
        }
        else if (type === 'bvn') {
            title.innerHTML = '<i class="fas fa-university text-primary"></i> BVN Lookup';
            body.innerHTML = `<input type="number" id="inp_kyc_num" class="form-control mb-3" placeholder="Enter 11 Digit BVN">`;
            btn.onclick = () => window.executeTransaction();
        }
        else if (type === 'demographic') {
            title.innerHTML = '<i class="fas fa-users text-info"></i> Demographic Search';
            body.innerHTML = `<input type="text" id="demo_surname" class="form-control mb-2" placeholder="Surname"><input type="text" id="demo_firstname" class="form-control mb-2" placeholder="First Name"><input type="date" id="demo_dob" class="form-control mb-2" placeholder="Birth Date"><select id="demo_gender" class="form-select mb-3"><option value="M">Male</option><option value="F">Female</option></select>`;
            btn.onclick = () => window.executeTransaction();
        }
        else if (type === 'nin_phone') {
            title.innerHTML = '<i class="fas fa-phone-alt text-success"></i> NIN by Phone Number';
            body.innerHTML = `<input type="number" id="inp_phone_num" class="form-control mb-3" placeholder="Enter Phone Number">`;
            btn.onclick = () => window.executeTransaction();
        }
        else if (type === 'bvn_phone') {
            title.innerHTML = '<i class="fas fa-mobile-alt text-primary"></i> BVN by Phone Number';
            body.innerHTML = `<input type="number" id="inp_phone_num" class="form-control mb-3" placeholder="Enter Phone Number">`;
            btn.onclick = () => window.executeTransaction();
        }
        else if (type === 'instant_validation') {
            title.innerHTML = '<i class="fas fa-bolt text-warning"></i> Instant Validation';
            body.innerHTML = `<input type="text" id="inp_value" class="form-control mb-3" placeholder="Enter NIN/BVN to validate">`;
            btn.onclick = () => window.executeTransaction();
        }
        
        modal.show();
    };

    // Existing helper functions remain unchanged
    window.fetchDataPlans = async () => {
        const network = document.getElementById('inp_network').value;
        if(!network) return;
        const planSelect = document.getElementById('inp_plan');
        planSelect.innerHTML = "<option>Loading plans...</option>";
        try {
            const res = await fetch(`${RENDER_URL}/api/fetch-data?action=data_plans&network=${network}`);
            const data = await res.json();
            const plans = data.data?.message?.details?.[0]?.plans || [];
            planSelect.innerHTML = "<option value=''>Select Plan...</option>";
            plans.forEach(p => {
                planSelect.innerHTML += `<option value="${p.plan_code}" data-price="${p.amount}">${p.name} - ₦${p.amount}</option>`;
            });
        } catch(e) { planSelect.innerHTML = `<option value="">Error</option>`; }
    };

    window.fetchTVPlans = async () => {
        const service = document.getElementById('inp_service').value;
        if(!service) return;
        const planSelect = document.getElementById('inp_plan');
        planSelect.innerHTML = "<option>Loading bouquets...</option>";
        try {
            const res = await fetch(`${RENDER_URL}/api/fetch-data?action=tv_bouquets&service=${service}`);
            const data = await res.json();
            const plans = data.data?.message?.details || [];
            planSelect.innerHTML = "<option value=''>Select Bouquet...</option>";
            plans.forEach(p => {
                planSelect.innerHTML += `<option value="${p.id}" data-price="${p.amount}">${p.name} - ₦${p.amount}</option>`;
            });
        } catch(e) { planSelect.innerHTML = `<option value="">Error</option>`; }
    };

    window.fetchExamPins = async () => {
        const examSelect = document.getElementById('inp_exam_id');
        examSelect.innerHTML = "<option>Loading Exams...</option>";
        try {
            const res = await fetch(`${RENDER_URL}/api/fetch-data?action=exam_pins`);
            const apiRes = await res.json();
            let pins = apiRes.data?.message?.details || [];
            examSelect.innerHTML = "<option value=''>Select Exam Type...</option>";
            pins.forEach(pin => {
                examSelect.innerHTML += `<option value="${pin.id}" data-price="${pin.amount}">${pin.title} - ₦${pin.amount}</option>`;
            });
        } catch(e) { 
            examSelect.innerHTML = `<option value="waec" data-price="3500">WAEC - ₦3500</option><option value="neco" data-price="1200">NECO - ₦1200</option><option value="nabteb" data-price="1000">NABTEB - ₦1000</option>`;
        }
    };

    window.calcSmsCost = () => {
        const phonesStr = document.getElementById('inp_phone').value;
        const msgStr = document.getElementById('inp_message').value;
        const count = phonesStr.split(',').filter(p => p.trim().length > 0).length;
        const pages = Math.ceil(msgStr.length / 160) || 1;
        const cost = count * pages * 6; 
        document.getElementById('smsCostPreview').innerText = `Cost: ₦${cost.toLocaleString()} (${count} numbers, ${pages} pages)`;
        return cost;
    };

    window.validateMeterOrTV = async () => {
        const type = window.activeService.type;
        const btn = document.getElementById('procBtn');
        const payload = { type, account: document.getElementById('inp_account').value, service: document.getElementById('inp_service').value };
        
        if(type === 'power') {
            payload.meter_type = document.getElementById('inp_meter_type').value;
            payload.amount = document.getElementById('inp_amount').value;
        } else {
            payload.plan_id = document.getElementById('inp_plan').value;
        }

        btn.disabled = true; btn.innerHTML = "Validating...";
        document.getElementById('srvLoader').style.display = "block";

        try {
            const res = await fetch(`${RENDER_URL}/api/validate`, {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
            });
            const out = await res.json();
            document.getElementById('srvLoader').style.display = "none";

            if (out.success) {
                const custName = out.data?.data?.message?.details?.customer_name || out.data?.data?.message?.details?.name || "Verified";
                window.activeService.customer_name = custName;
                document.getElementById('srvExtra').innerHTML = `<div class="alert alert-success fw-bold text-center">Verified: ${custName}</div>`;
                btn.innerText = "Pay Now";
                btn.disabled = false;
                btn.onclick = () => window.executeTransaction();
            } else {
                alert("Validation Failed: " + out.message);
                btn.disabled = false; btn.innerText = "Validate";
            }
        } catch(e) { alert("Network Error."); btn.disabled = false; document.getElementById('srvLoader').style.display = "none";}
    };

    window.executeTransaction = async () => {
        const uid = auth.currentUser.uid;
        const type = window.activeService.type;
        const btn = document.getElementById('procBtn');
        const payload = { uid, type, customer_name: window.activeService.customer_name };
        let costAmount = 0;

        // Vending cost calculations
        if (type === 'data' || type === 'smile') {
            const p = document.getElementById('inp_plan');
            payload.network = document.getElementById('inp_network').value;
            payload.plan = p.value;
            payload.phone = document.getElementById('inp_phone').value;
            costAmount = parseFloat(p.options[p.selectedIndex].getAttribute('data-price')) + 10; 
        } 
        else if (type === 'airtime' || type === 'airtime_cash') {
            payload.network = document.getElementById('inp_network').value;
            payload.phone = document.getElementById('inp_phone').value;
            payload.amount = document.getElementById('inp_amount').value;
            costAmount = type === 'airtime' ? parseFloat(payload.amount) : 0;
        }
        else if (type === 'tv') {
            const p = document.getElementById('inp_plan');
            payload.service = document.getElementById('inp_service').value;
            payload.plan_id = p.value;
            payload.account = document.getElementById('inp_account').value;
            payload.phone = document.getElementById('inp_phone').value;
            costAmount = parseFloat(p.options[p.selectedIndex].getAttribute('data-price')) + 30; 
        }
        else if (type === 'power') {
            payload.service = document.getElementById('inp_service').value;
            payload.meter_number = document.getElementById('inp_account').value;
            payload.meter_type = document.getElementById('inp_meter_type').value;
            payload.amount = document.getElementById('inp_amount').value;
            payload.phone = document.getElementById('inp_phone').value;
            costAmount = parseFloat(payload.amount) + 50; 
        }
        else if (type === 'exam') {
            const p = document.getElementById('inp_exam_id');
            payload.exam_id = p.value;
            payload.qty = document.getElementById('inp_qty').value;
            const unitPrice = parseFloat(p.options[p.selectedIndex].getAttribute('data-price'));
            costAmount = (unitPrice * parseFloat(payload.qty)) + 50; 
        }
        else if (type === 'sms') {
            payload.sender_id = document.getElementById('inp_sender').value || "Update";
            payload.phone = document.getElementById('inp_phone').value;
            payload.message = document.getElementById('inp_message').value;
            costAmount = window.calcSmsCost(); 
        }
        else if (type === 'recharge_card') {
    payload.network = document.getElementById('card_network').value;
    payload.amount = document.getElementById('card_amount').value;
    payload.quantity = document.getElementById('card_quantity').value;
    // Cost = amount × quantity (plus service fee)
    costAmount = (parseFloat(payload.amount) * parseInt(payload.quantity)) + 50;
}
        // USD Card Services
        else if (type === 'usd_card') {
            payload.brand = document.getElementById('card_brand').value;
            payload.amount = document.getElementById('card_amount').value;
            costAmount = parseFloat(payload.amount) * 1600; // Convert USD to NGN (approx rate)
        }
        else if (type === 'card_balance') {
            payload.card_id = document.getElementById('card_id').value;
            costAmount = 50; // Query fee
        }
        else if (type === 'card_freeze') {
            payload.card_id = document.getElementById('card_id').value;
            payload.action = document.getElementById('freeze_action').value;
            costAmount = 0;
        }
        else if (type === 'card_topup') {
            payload.card_id = document.getElementById('card_id').value;
            payload.amount = document.getElementById('topup_amount').value;
            costAmount = parseFloat(payload.amount) * 1600;
        }
        // Identity cost calculations
        else if (type === 'nin1' || type === 'nin2' || type === 'nin3' || type === 'bvn') {
            payload[type === 'bvn' ? 'bvn' : 'nin'] = document.getElementById('inp_kyc_num').value;
            costAmount = 150;
        }
        else if (type === 'demographic') {
            payload.surname = document.getElementById('demo_surname').value;
            payload.first_name = document.getElementById('demo_firstname').value;
            payload.birth_date = document.getElementById('demo_dob').value;
            payload.gender = document.getElementById('demo_gender').value;
            costAmount = 200;
        }
        else if (type === 'nin_phone') {
            payload.phone = document.getElementById('inp_phone_num').value;
            costAmount = 150;
        }
        else if (type === 'bvn_phone') {
            payload.phone = document.getElementById('inp_phone_num').value;
            costAmount = 150;
        }
        else if (type === 'instant_validation') {
            payload.value = document.getElementById('inp_value').value;
            costAmount = 180;
        }

        payload.costAmount = costAmount; 
        if(!confirm(`You will be charged ₦${costAmount.toLocaleString()}. Proceed?`)) return;

        btn.disabled = true; btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Processing...`;
        document.getElementById('srvLoader').style.display = "block";

        try {
            const res = await fetch(`${RENDER_URL}/api/process`, {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
            });
            const out = await res.json();
            document.getElementById('srvLoader').style.display = "none";
            
            if(out.success) {
                document.getElementById('srvExtra').innerHTML = `<div class="alert alert-success text-center fw-bold"><i class="fas fa-check-circle fa-2x"></i><br>Success!</div>`;
                btn.style.display = "none"; 
                setTimeout(() => location.reload(), 2000);
            } else {
                alert(out.message);
                btn.disabled = false; btn.innerText = "Try Again";
            }
        } catch(e) { 
            alert("Network Error."); 
            btn.disabled = false; btn.innerText = "Process"; 
            document.getElementById('srvLoader').style.display = "none";
        }
    };

    window.genAcc = async () => {
        const kycType = document.getElementById('kycType').value;
        const kycNumber = document.getElementById('kycNumber').value.trim();
        if (kycNumber.length !== 11) return alert(`Enter valid 11-digit ${kycType.toUpperCase()}.`);

        const btn = document.getElementById('btn-gen-acc');
        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Processing...`; btn.disabled = true;
        
        try {
            const res = await fetch(`${RENDER_URL}/api/gen-account`, {
                method: 'POST', headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ uid: auth.currentUser.uid, kycType, kycNumber })
            });
            const out = await res.json();
            alert(out.message);
            if(out.success) location.reload();
            else { btn.innerHTML = `<i class="fas fa-plus"></i> Try Again`; btn.disabled = false; }
        } catch(e) { alert("Error connecting."); btn.innerHTML = `<i class="fas fa-plus"></i> Try Again`; btn.disabled = false; }
    };

    const logout = () => signOut(auth).then(() => window.location.href="login.html");
    document.getElementById('btn-logout').onclick = logout;
    document.getElementById('btn-logout-mobile').onclick = logout;
</script>
</body>
</html>
