<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Usman Data Sub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f4f6f9; font-family: 'Inter', sans-serif; }
        .sidebar { background: #004a99; color: white; min-height: 100vh; padding: 20px; position: sticky; top: 0; }
        .balance-card { background: linear-gradient(45deg, #004a99, #007bff); color: white; border-radius: 15px; padding: 30px; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,74,153,0.2); }
        .service-btn { background: white; border: none; border-radius: 15px; padding: 20px; text-align: center; transition: 0.3s; width: 100%; height: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; }
        .service-btn:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); border: 2px solid #004a99;}
        .service-btn i { font-size: 2rem; color: #004a99; margin-bottom: 10px; }
        .srv-name { font-weight: 600; font-size: 0.9rem; color: #333; }
        .loader { display: none; text-align: center; margin: 10px 0; color: #004a99; font-weight: bold; }
    </style>
</head>
<body>

<!-- Mobile Navbar -->
<nav class="navbar navbar-dark bg-primary d-md-none px-3">
    <span class="navbar-brand fw-bold mb-0 h1">USMAN DATA</span>
    <button class="btn btn-outline-light btn-sm" id="btn-logout-mobile"><i class="fas fa-sign-out-alt"></i> Logout</button>
</nav>

<div class="container-fluid">
    <div class="row">
        <!-- Desktop Sidebar -->
        <div class="col-md-2 sidebar d-none d-md-block">
            <h4 class="fw-bold mb-4">USMAN DATA</h4>
            <hr>
            <nav class="nav flex-column">
                <a class="nav-link text-white active" href="#"><i class="fas fa-home me-2"></i> Dashboard</a>
                <button class="btn btn-danger mt-4 w-100 fw-bold" id="btn-logout"><i class="fas fa-sign-out-alt me-2"></i> Logout</button>
            </nav>
        </div>

        <div class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3>Hello, <span id="userName" class="text-primary text-capitalize">User</span></h3>
                <div class="d-flex gap-2">
                    <span id="roleBadge" class="badge bg-dark d-flex align-items-center">LOADING...</span>
                </div>
            </div>

            <div class="balance-card">
                <p>Available Balance</p>
                <h1 class="fw-bold">₦<span id="userBalance">0.00</span></h1>
                <button class="btn btn-warning mt-2 fw-bold" onclick="window.location.href='fund.html'">+ Add Money</button>
            </div>

            <!-- Virtual Account Display -->
            <div class="card mb-4 border-0 shadow-sm p-3" id="vAccCard" style="border-radius: 15px;">
                <h6 class="fw-bold">Funding Account (Instant Auto-Funding)</h6>
                <div id="vAccDisplay" class="text-muted small">Checking for account...</div>
            </div>

            <div class="row g-3">
                <div class="col-6 col-md-3"><button class="service-btn" onclick="openSrv('data')"><i class="fas fa-wifi"></i><br><span class="srv-name">Buy Data</span></button></div>
                <div class="col-6 col-md-3"><button class="service-btn" onclick="openSrv('airtime')"><i class="fas fa-phone"></i><br><span class="srv-name">Airtime</span></button></div>
                <div class="col-6 col-md-3"><button class="service-btn" onclick="openSrv('tv')"><i class="fas fa-tv"></i><br><span class="srv-name">Cable TV</span></button></div>
                <div class="col-6 col-md-3"><button class="service-btn" onclick="openSrv('power')"><i class="fas fa-lightbulb"></i><br><span class="srv-name">Electricity</span></button></div>
                <div class="col-6 col-md-3"><button class="service-btn" onclick="openSrv('exam')"><i class="fas fa-graduation-cap"></i><br><span class="srv-name">Exam Pins</span></button></div>
                <div class="col-6 col-md-3"><button class="service-btn" onclick="openSrv('sms')"><i class="fas fa-envelope"></i><br><span class="srv-name">Bulk SMS</span></button></div>
                <div class="col-6 col-md-3"><button class="service-btn" onclick="openSrv('nin')"><i class="fas fa-id-card"></i><br><span class="srv-name">NIN Search</span></button></div>
            </div>
        </div>
    </div>
</div>

<!-- Dynamic Modal -->
<div class="modal fade" id="srvModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0" style="border-radius: 20px;">
      <div class="modal-header border-0">
          <h5 class="modal-title fw-bold" id="srvTitle">Service</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
          <div id="srvBody"></div>
          <div class="loader" id="srvLoader"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
          <div id="srvExtra"></div>
      </div>
      <div class="modal-footer border-0">
          <button class="btn btn-primary w-100 fw-bold py-2" id="procBtn" style="display:none;">Proceed</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAmJIfWsqFVHyP-F3W85u4UbbxANMQaOTw",
        authDomain: "usmandatasub-7f93c.firebaseapp.com",
        projectId: "usmandatasub-7f93c",
        storageBucket: "usmandatasub-7f93c.firebasestorage.app",
        messagingSenderId: "133797152161",
        appId: "1:133797152161:web:18ac35c888c901695377e0",
        databaseURL: "https://usmandatasub-7f93c-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    
    // IMPORTANT: Change this if your render URL is different!
    const RENDER_URL = "https://usmandata.onrender.com";

    window.activeService = {};

    onAuthStateChanged(auth, (user) => {
        if (user) {
            onValue(ref(db, 'users/' + user.uid), (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('userName').innerText = data.fullName;
                    document.getElementById('userBalance').innerText = data.balance.toLocaleString('en-NG', {minimumFractionDigits: 2});
                    document.getElementById('roleBadge').innerText = data.role.toUpperCase();
                    
                    if(data.virtual_account) {
                        document.getElementById('vAccDisplay').innerHTML = `<h5 class="text-primary mb-0">${data.bank_name}</h5><h4 class="fw-bold">${data.virtual_account}</h4>`;
                    } else {
                        // NEW: Inject KYC form instead of just a button
                        document.getElementById('vAccDisplay').innerHTML = `
                            <p class="text-danger small mb-2"><i class="fas fa-shield-alt"></i> CBN Policy requires NIN or BVN to generate an account.</p>
                            <div class="input-group mb-2">
                                <select id="kycType" class="form-select" style="max-width: 100px;">
                                    <option value="nin">NIN</option>
                                    <option value="bvn">BVN</option>
                                </select>
                                <input type="number" id="kycNumber" class="form-control" placeholder="Enter 11-digit number">
                            </div>
                            <button class="btn btn-sm btn-primary w-100" id="btn-gen-acc" onclick="window.genAcc()">
                                <i class="fas fa-plus"></i> Generate Funding Account
                            </button>
                        `;
                    }
                }
            });
        } else { window.location.href = "login.html"; }
    });

    window.openSrv = (type) => {
        const modal = new bootstrap.Modal(document.getElementById('srvModal'));
        const body = document.getElementById('srvBody');
        const extra = document.getElementById('srvExtra');
        const title = document.getElementById('srvTitle');
        const btn = document.getElementById('procBtn');
        
        extra.innerHTML = "";
        btn.style.display = "block";
        btn.innerText = "Process Transaction";
        window.activeService = { type };

        if (type === 'data') {
            title.innerText = "Buy Data";
            body.innerHTML = `
                <select id="inp_network" class="form-select mb-3" onchange="window.fetchDataPlans()">
                    <option value="">Select Network...</option>
                    <option value="mtn">MTN</option><option value="airtel">Airtel</option>
                    <option value="glo">GLO</option><option value="9mobile">9Mobile</option>
                </select>
                <select id="inp_plan" class="form-select mb-3"><option value="">Select Plan (Pick network first)</option></select>
                <input type="number" id="inp_phone" class="form-control mb-3" placeholder="Recipient Phone Number">
            `;
            btn.onclick = () => window.executeTransaction();
        } 
        else if (type === 'airtime') {
            title.innerText = "Buy Airtime";
            body.innerHTML = `
                <select id="inp_network" class="form-select mb-3">
                    <option value="mtn">MTN</option><option value="airtel">Airtel</option>
                    <option value="glo">GLO</option><option value="9mobile">9Mobile</option>
                </select>
                <input type="number" id="inp_amount" class="form-control mb-3" placeholder="Amount (₦)">
                <input type="number" id="inp_phone" class="form-control mb-3" placeholder="Phone Number">
            `;
            btn.onclick = () => window.executeTransaction();
        }
        else if (type === 'tv') {
            title.innerText = "Cable TV Subscription";
            body.innerHTML = `
                <select id="inp_service" class="form-select mb-3" onchange="window.fetchTVPlans()">
                    <option value="">Select Provider...</option>
                    <option value="dstv">DSTV</option><option value="gotv">GOTV</option><option value="startimes">Startimes</option>
                </select>
                <select id="inp_plan" class="form-select mb-3"><option value="">Select Bouquet (Pick provider first)</option></select>
                <input type="number" id="inp_account" class="form-control mb-3" placeholder="IUC / Smartcard Number">
                <input type="number" id="inp_phone" class="form-control mb-3" placeholder="Customer Phone Number">
            `;
            btn.innerText = "Validate Smartcard";
            btn.onclick = () => window.validateMeterOrTV();
        }
        else if (type === 'power') {
            title.innerText = "Electricity Bill";
            body.innerHTML = `
                <select id="inp_service" class="form-select mb-3">
                    <option value="ikedc">Ikeja Electric</option><option value="ekedc">Eko Electric</option>
                    <option value="kano">Kano Electric</option><option value="phedc">Port Harcourt</option>
                    <option value="ibedc">Ibadan Electric</option><option value="abuja">Abuja Electric</option>
                </select>
                <select id="inp_meter_type" class="form-select mb-3">
                    <option value="prepaid">Prepaid</option><option value="postpaid">Postpaid</option>
                </select>
                <input type="number" id="inp_account" class="form-control mb-3" placeholder="Meter Number">
                <input type="number" id="inp_amount" class="form-control mb-3" placeholder="Amount (₦)">
                <input type="number" id="inp_phone" class="form-control mb-3" placeholder="Customer Phone Number">
            `;
            btn.innerText = "Validate Meter";
            btn.onclick = () => window.validateMeterOrTV();
        }
        else if (type === 'exam') {
            title.innerText = "Exam Pins";
            body.innerHTML = `
                <select id="inp_exam_id" class="form-select mb-3">
                    <option value="">Loading Exams...</option>
                </select>
                <input type="number" id="inp_qty" class="form-control mb-3" placeholder="Quantity (e.g. 1)" value="1">
            `;
            window.fetchExamPins();
            btn.onclick = () => window.executeTransaction();
        }
        else if (type === 'nin') {
            title.innerText = "NIN Search";
            body.innerHTML = `<input type="number" id="inp_nin" class="form-control mb-3" placeholder="11 Digit NIN Number">`;
            btn.onclick = () => window.executeTransaction();
        }

        modal.show();
    };

    const getArraySafely = (apiResponse) => {
        if (!apiResponse) return [];
        let payload = apiResponse.data || apiResponse;
        if (Array.isArray(payload)) return payload;
        if (payload.message) {
            if (Array.isArray(payload.message.details)) return payload.message.details;
            if (Array.isArray(payload.message)) return payload.message;
        }
        if (payload.details && Array.isArray(payload.details)) return payload.details;
        return [];
    };

    window.fetchDataPlans = async () => {
        const network = document.getElementById('inp_network').value;
        if(!network) return;
        const planSelect = document.getElementById('inp_plan');
        planSelect.innerHTML = "<option>Loading plans... <i class='fas fa-spinner fa-spin'></i></option>";
        
        try {
            const res = await fetch(`${RENDER_URL}/api/fetch-data?action=data_plans&network=${network}`);
            const data = await res.json();
            if (!data.success) throw new Error(data.message);

            const plans = getArraySafely(data);
            planSelect.innerHTML = "<option value=''>Select Plan...</option>";
            plans.forEach(p => {
                const name = p.name || p.description || p.title || "Data Plan";
                const price = p.amount || p.price || 0;
                const code = p.plan_code || p.id || p.code || "";
                planSelect.innerHTML += `<option value="${code}" data-price="${price}">${name} - ₦${price}</option>`;
            });
        } catch(e) { 
            planSelect.innerHTML = `<option>Error: ${e.message}</option>`; 
        }
    };

    window.fetchTVPlans = async () => {
        const service = document.getElementById('inp_service').value;
        if(!service) return;
        const planSelect = document.getElementById('inp_plan');
        planSelect.innerHTML = "<option>Loading bouquets... <i class='fas fa-spinner fa-spin'></i></option>";
        
        try {
            const res = await fetch(`${RENDER_URL}/api/fetch-data?action=tv_bouquets&service=${service}`);
            const data = await res.json();
            if (!data.success) throw new Error(data.message);

            const plans = getArraySafely(data);
            planSelect.innerHTML = "<option value=''>Select Bouquet...</option>";
            plans.forEach(p => {
                const name = p.name || p.description || "Bouquet";
                const price = p.amount || p.price || 0;
                const code = p.plan_code || p.id || p.code || "";
                planSelect.innerHTML += `<option value="${code}" data-price="${price}">${name} - ₦${price}</option>`;
            });
        } catch(e) { planSelect.innerHTML = `<option>Error: ${e.message}</option>`; }
    };

    window.fetchExamPins = async () => {
        const examSelect = document.getElementById('inp_exam_id');
        examSelect.innerHTML = "<option>Loading Exams... <i class='fas fa-spinner fa-spin'></i></option>";
        try {
            const res = await fetch(`${RENDER_URL}/api/fetch-data?action=exam_pins`);
            const data = await res.json();
            if (!data.success) throw new Error(data.message);

            const plans = getArraySafely(data);
            examSelect.innerHTML = "<option value=''>Select Exam Type...</option>";
            plans.forEach(p => {
                const name = p.name || p.description || "Exam Pin";
                const price = p.amount || p.price || 0;
                const code = p.id || p.plan_code || p.code || "";
                examSelect.innerHTML += `<option value="${code}" data-price="${price}">${name} - ₦${price}</option>`;
            });
        } catch(e) { examSelect.innerHTML = `<option>Error: ${e.message}</option>`; }
    };

    window.validateMeterOrTV = async () => {
        const type = window.activeService.type;
        const loader = document.getElementById('srvLoader');
        const extra = document.getElementById('srvExtra');
        const btn = document.getElementById('procBtn');
        
        const account = document.getElementById('inp_account').value;
        const service = document.getElementById('inp_service').value;
        if(!account || !service) return alert("Please fill all details to validate.");

        const payload = { type, account, service };
        if(type === 'power') {
            payload.meter_type = document.getElementById('inp_meter_type').value;
            payload.amount = document.getElementById('inp_amount').value;
        }

        loader.style.display = "block";
        btn.disabled = true;

        try {
            const res = await fetch(`${RENDER_URL}/api/validate`, {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
            });
            const out = await res.json();
            loader.style.display = "none";

            if (out.success) {
                const custName = out.data.message?.details?.customer_name || out.data.message?.details?.name || "Customer Verified";
                window.activeService.customer_name = custName;
                window.activeService.address = out.data.message?.details?.address || "Nigeria"; 
                
                extra.innerHTML = `<div class="alert alert-success mt-3"><strong>Verified Name:</strong> ${custName}</div>`;
                btn.innerText = "Pay Now";
                btn.disabled = false;
                btn.onclick = () => window.executeTransaction();
            } else {
                alert("Validation Failed: " + out.message);
                btn.disabled = false;
            }
        } catch(e) {
            loader.style.display = "none";
            btn.disabled = false;
            alert("Network Error during validation.");
        }
    };

    window.executeTransaction = async () => {
        const uid = auth.currentUser.uid;
        const type = window.activeService.type;
        const btn = document.getElementById('procBtn');
        
        const payload = { uid, type, customer_name: window.activeService.customer_name, address: window.activeService.address };
        let costAmount = 0;

        if (type === 'data') {
            const planEl = document.getElementById('inp_plan');
            if(!planEl.value) return alert("Select a plan.");
            payload.network = document.getElementById('inp_network').value;
            payload.plan = planEl.value;
            payload.phone = document.getElementById('inp_phone').value;
            costAmount = parseFloat(planEl.options[planEl.selectedIndex].getAttribute('data-price')) + 10; 
        } 
        else if (type === 'airtime') {
            payload.network = document.getElementById('inp_network').value;
            payload.phone = document.getElementById('inp_phone').value;
            payload.amount = document.getElementById('inp_amount').value;
            costAmount = parseFloat(payload.amount); 
        }
        else if (type === 'nin') {
            payload.nin = document.getElementById('inp_nin').value;
            costAmount = 150; 
        }
        else if (type === 'tv') {
            const planEl = document.getElementById('inp_plan');
            payload.service = document.getElementById('inp_service').value;
            payload.plan_id = planEl.value;
            payload.account = document.getElementById('inp_account').value;
            payload.phone = document.getElementById('inp_phone').value;
            costAmount = parseFloat(planEl.options[planEl.selectedIndex].getAttribute('data-price')) + 30; 
        }
        else if (type === 'power') {
            payload.service = document.getElementById('inp_service').value;
            payload.meter_number = document.getElementById('inp_account').value;
            payload.meter_type = document.getElementById('inp_meter_type').value;
            payload.amount = document.getElementById('inp_amount').value;
            payload.phone = document.getElementById('inp_phone').value;
            costAmount = parseFloat(payload.amount) + 50; 
        }
        else if (type === 'exam') {
            const examEl = document.getElementById('inp_exam_id');
            payload.exam_id = examEl.value;
            payload.qty = document.getElementById('inp_qty').value;
            const unitPrice = parseFloat(examEl.options[examEl.selectedIndex].getAttribute('data-price'));
            costAmount = (unitPrice * parseFloat(payload.qty)) + 50; 
        }

        payload.costAmount = costAmount; 

        if(!confirm(`You are about to be charged ₦${costAmount}. Proceed?`)) return;

        btn.disabled = true; 
        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Processing...`;
        document.getElementById('srvLoader').style.display = "block";

        try {
            const res = await fetch(`${RENDER_URL}/api/process`, {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
            });
            const out = await res.json();
            
            document.getElementById('srvLoader').style.display = "none";
            
            if(out.success) {
                document.getElementById('srvExtra').innerHTML = `
                    <div class="alert alert-success mt-3 text-center">
                        <i class="fas fa-check-circle fa-2x mb-2"></i><br>
                        ${out.message}
                    </div>
                `;
                btn.style.display = "none"; 
            } else {
                alert(out.message || "Transaction Failed.");
                btn.disabled = false; btn.innerText = "Try Again";
            }
        } catch(e) { 
            document.getElementById('srvLoader').style.display = "none";
            alert("Network Error. Check your balance."); 
            btn.disabled = false; btn.innerText = "Process Transaction";
        }
    };

    // --- VIRTUAL ACCOUNT GENERATION (WITH KYC) ---
    window.genAcc = async () => {
        const kycType = document.getElementById('kycType').value;
        const kycNumber = document.getElementById('kycNumber').value.trim();

        if (kycNumber.length !== 11) {
            return alert(`Please enter a valid 11-digit ${kycType.toUpperCase()}.`);
        }

        const btn = document.getElementById('btn-gen-acc');
        const originalHtml = btn.innerHTML;
        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Verifying details...`;
        btn.disabled = true;
        
        try {
            const res = await fetch(`${RENDER_URL}/api/gen-account`, {
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ 
                    uid: auth.currentUser.uid, 
                    kycType: kycType, 
                    kycNumber: kycNumber 
                })
            });
            const out = await res.json();
            
            if(!out.success) {
                alert(out.message); 
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            } else {
                alert(out.message);
                // The Firebase listener will automatically replace the form with the new account numbers!
            }
        } catch(e) {
            console.error(e);
            alert("Network Error: Could not connect to server.");
            btn.innerHTML = originalHtml;
            btn.disabled = false;
        }
    };

    const logout = () => signOut(auth).then(() => window.location.href="login.html");
    document.getElementById('btn-logout').onclick = logout;
    document.getElementById('btn-logout-mobile').onclick = logout;
</script>
</body>
</html>
