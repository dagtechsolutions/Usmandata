<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Usman Data Sub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>

    <style>
        body { background: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #1e293b; }
        
        .sidebar { background: #0f172a; color: white; min-height: 100vh; padding: 20px; position: sticky; top: 0; box-shadow: 4px 0 15px rgba(0,0,0,0.05); }
        .nav-link-side { color: #94a3b8; font-weight: 600; padding: 12px 15px; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; display: block; text-decoration: none;}
        .nav-link-side:hover, .nav-link-side.active { background: rgba(255,255,255,0.1); color: #fff; }
        
        .balance-card { 
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); 
            color: white; border-radius: 20px; padding: 35px 30px; margin-bottom: 25px; 
            box-shadow: 0 15px 35px rgba(30, 58, 138, 0.2); position: relative; overflow: hidden;
        }
        .balance-card::after {
            content: '\f0d6'; font-family: 'Font Awesome 5 Free'; font-weight: 900;
            position: absolute; right: -20px; bottom: -30px; font-size: 10rem; opacity: 0.05; transform: rotate(-15deg);
        }
        .balance-card h1 { font-size: 3rem; font-weight: 800; letter-spacing: -1px; margin: 5px 0 15px 0;}
        
        /* Inline Tabs - Side by Side */
        .inline-tabs { display: flex; gap: 12px; margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; padding-bottom: 0; overflow-x: auto; }
        .inline-tab { padding: 12px 28px; font-weight: 700; font-size: 1rem; border: none; background: transparent; color: #64748b; transition: 0.3s; cursor: pointer; border-radius: 12px 12px 0 0; white-space: nowrap; }
        .inline-tab:hover { color: #0f172a; background: #f1f5f9; }
        .inline-tab.active { color: #047857; background: white; border-bottom: 3px solid #047857; }
        
        .service-btn { background: white; border: 1px solid #e2e8f0; border-radius: 18px; padding: 25px 15px; text-align: center; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 100%; height: 100%; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .service-btn:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border-color: #3b82f6; }
        .icon-wrapper { width: 60px; height: 60px; border-radius: 15px; background: #eff6ff; color: #2563eb; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin: 0 auto 15px; }
        .srv-name { font-weight: 700; font-size: 0.95rem; color: #334155; }
        
        .vacc-box { background: white; border: 1px solid #e2e8f0; border-left: 5px solid #10b981; border-radius: 15px; padding: 20px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);}
        
        .modal-content { border-radius: 24px; border: none; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .modal-header { background: #f8fafc; border-radius: 24px 24px 0 0; border-bottom: 1px solid #e2e8f0; padding: 20px 25px; }
        .form-control, .form-select { border-radius: 10px; padding: 12px 15px; border: 2px solid #e2e8f0; background: #f8fafc; font-weight: 500; }
        .form-control:focus, .form-select:focus { border-color: #3b82f6; background: white; box-shadow: none; }
        .loader { display: none; text-align: center; margin: 15px 0; color: #3b82f6; }
        #procBtn { border-radius: 12px; font-size: 1.1rem; padding: 14px; box-shadow: 0 4px 15px rgba(37,99,235,0.3); transition: 0.3s; }
        #procBtn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37,99,235,0.4); }
        
        /* Data Plan Grid Aesthetics */
        .nav-pills .nav-link { border-radius: 50px; font-weight: bold; color: #64748b; padding: 8px 20px; margin-right: 10px; transition: 0.3s; border: 1px solid #e2e8f0; background: white; }
        .nav-pills .nav-link.active { background-color: #047857; color: white; border-color: #047857; box-shadow: 0 4px 10px rgba(4,120,87,0.2); }
        
        .plan-card { border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; transition: all 0.2s; background: white; height: 100%; display: flex; flex-direction: column; justify-content: center; }
        .plan-card:hover { border-color: #94a3b8; }
        .plan-card.selected { border-color: #047857; background: #ecfdf5; box-shadow: 0 4px 10px rgba(4, 120, 87, 0.15); transform: scale(1.02); }
        
        .whatsapp-float { position: fixed; bottom: 30px; right: 30px; z-index: 1000; animation: pulse 2s infinite; }
        .whatsapp-float a { display: flex; align-items: center; justify-content: center; width: 65px; height: 65px; background: #25D366; color: white; border-radius: 50%; text-decoration: none; box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4); transition: all 0.3s ease; }
        .whatsapp-float a:hover { transform: scale(1.1); box-shadow: 0 12px 25px rgba(37, 211, 102, 0.5); }
        .whatsapp-float i { font-size: 2.5rem; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .footer { background: white; border-top: 1px solid #e2e8f0; padding: 25px 0; margin-top: 50px; text-align: center; }
        .badge-humanity { background: #eef2ff; color: #1e40af; font-size: 0.65rem; padding: 3px 8px; border-radius: 20px; margin-top: 8px; display: inline-block; }
        .usd-badge { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #0f172a; font-size: 0.7rem; font-weight: bold; padding: 4px 10px; border-radius: 20px; margin-top: 8px; display: inline-block; }
    </style>
</head>

<div class="modal fade" id="srvModal" tabindex="-1" data-bs-backdrop="static">

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAmJIfWsqFVHyP-F3W85u4UbbxANMQaOTw",
        authDomain: "usmandatasub-7f93c.firebaseapp.com",
        projectId: "usmandatasub-7f93c",
        storageBucket: "usmandatasub-7f93c.firebasestorage.app",
        messagingSenderId: "133797152161",
        appId: "1:133797152161:web:18ac35c888c901695377e0",
        databaseURL: "https://usmandatasub-7f93c-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const RENDER_URL = "https://usmandata.onrender.com";

    window.activeService = {};
    window.allFetchedPlans = []; 

    // Tab switching logic
    const tabVending = document.getElementById('tabVending');
    const tabIdentity = document.getElementById('tabIdentity');
    const tabCards = document.getElementById('tabCards');
    const vendingContent = document.getElementById('pills-vending');
    const identityContent = document.getElementById('pills-kyc');
    const cardsContent = document.getElementById('pills-cards');
    
    const resetTabs = () => {
        [tabVending, tabIdentity, tabCards].forEach(t => t.classList.remove('active'));
        [vendingContent, identityContent, cardsContent].forEach(c => { c.style.display = 'none'; c.classList.remove('show', 'active'); });
    };

    tabVending.addEventListener('click', () => { resetTabs(); tabVending.classList.add('active'); vendingContent.style.display = 'block'; vendingContent.classList.add('show', 'active'); });
    tabIdentity.addEventListener('click', () => { resetTabs(); tabIdentity.classList.add('active'); identityContent.style.display = 'block'; identityContent.classList.add('show', 'active'); });
    tabCards.addEventListener('click', () => { resetTabs(); tabCards.classList.add('active'); cardsContent.style.display = 'block'; cardsContent.classList.add('show', 'active'); });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            onValue(ref(db, 'users/' + user.uid), (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('userName').innerText = data.fullName || "User";
                    const bal = parseFloat(data.balance);
                    document.getElementById('userBalance').innerText = isNaN(bal) ? "0.00" : bal.toLocaleString('en-NG', {minimumFractionDigits: 2});
                    document.getElementById('roleBadge').innerText = (data.role || "user").toUpperCase();
                    
                    if(data.virtual_account) {
                        document.getElementById('vAccDisplay').innerHTML = `
                            <div style="background: linear-gradient(135deg, #f8fafc, #e2e8f0); padding: 15px; border-radius: 12px; border: 1px solid #cbd5e1; position: relative; overflow: hidden;">
                                <div style="position: absolute; right: -10px; top: -10px; opacity: 0.1;">
                                    <i class="fas fa-university" style="font-size: 5rem; color: #004a99;"></i>
                                </div>
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; position: relative; z-index: 2;">
                                    <span style="font-size: 0.85rem; color: #64748b; font-weight: bold; text-transform: uppercase;">${data.bank_name || "9PSB Bank"}</span>
                                    <span style="background: #dcfce7; color: #166534; font-size: 0.7rem; padding: 3px 8px; border-radius: 20px; font-weight: bold;"><i class="fas fa-bolt"></i> Auto-Funding</span>
                                </div>
                                <h3 style="color: #004a99; font-weight: 900; letter-spacing: 2px; margin: 0; font-family: monospace; position: relative; z-index: 2;">
                                    ${data.virtual_account}
                                </h3>
                            </div>
                        `;
                    } else {
                        document.getElementById('vAccDisplay').innerHTML = `
                            <div class="alert alert-warning p-2 mb-3" style="font-size:0.85rem; border-left: 4px solid #ffc107;">
                                <i class="fas fa-shield-alt text-danger"></i> <b>CBN KYC:</b> To generate an account, your registered name <b>(${data.fullName})</b> MUST match your BVN/NIN.
                            </div>
                            <div class="input-group mb-2 shadow-sm">
                                <select id="kycType" class="form-select bg-white fw-bold" style="max-width: 100px;">
                                    <option value="nin">NIN</option>
                                    <option value="bvn">BVN</option>
                                </select>
                                <input type="number" id="kycNumber" class="form-control" placeholder="Enter 11-digit number">
                            </div>
                            <button class="btn btn-primary w-100 fw-bold shadow-sm" id="btn-gen-acc" onclick="window.genAcc()">
                                <i class="fas fa-plus"></i> Generate Account
                            </button>
                        `;
                    }
                }
            });
        } else { window.location.href = "login.html"; }
    });

    // --- MODAL GENERATOR ---
    window.openSrv = (type) => {
        const modal = new bootstrap.Modal(document.getElementById('srvModal'));
        const body = document.getElementById('srvBody');
        const extra = document.getElementById('srvExtra');
        const title = document.getElementById('srvTitle');
        const btn = document.getElementById('procBtn');
        
        extra.innerHTML = "";
        btn.style.display = "block";
        btn.innerText = "Process Transaction";
        window.activeService = { type };

    const getArraySafely = (apiResponse) => {
        if (!apiResponse) return [];
        let payload = apiResponse.data || apiResponse;
        if (Array.isArray(payload)) return payload;
        if (payload.message) {
            if (Array.isArray(payload.message.details)) return payload.message.details;
            if (Array.isArray(payload.message)) return payload.message;
        }
        if (payload.details && Array.isArray(payload.details)) return payload.details;
        for (let key in payload) {
            if (Array.isArray(payload[key])) return payload[key];
        }
        return [];
    };

    // 🌟 DATA PLANS GRID FETCHER 🌟
    window.fetchDataPlans = async () => {
        const network = document.getElementById('inp_network').value;
        const gridContainer = document.getElementById('dataGridContainer');
        const tabsContainer = document.getElementById('dataTabsContainer');
        
        if(!network) {
            tabsContainer.style.display = "none";
            gridContainer.innerHTML = "";
            return;
        }
        
        gridContainer.innerHTML = "<div class='col-12 text-center py-4'><i class='fas fa-spinner fa-spin fa-2x text-primary'></i><br>Loading plans...</div>";
        tabsContainer.style.display = "none";
        
        try {
            const res = await fetch(`${RENDER_URL}/api/fetch-data?action=data_plans&network=${network}`);
            const data = await res.json();
            
            if (!data.success) throw new Error(data.message);

            let plans = [];
            if (data.data?.message?.details?.[0]?.plans) plans = data.data.message.details[0].plans;
            else plans = getArraySafely(data);

            if (plans.length === 0) throw new Error("No plans available");

            window.allFetchedPlans = plans;
            tabsContainer.style.display = "block";
            
            // Automatically click the SME tab to render default view
            document.querySelector('#dataTabs .nav-link.active').click();

        } catch(e) { 
            gridContainer.innerHTML = `<div class='col-12 text-center text-danger'>Error: ${e.message}</div>`; 
        }
    };

    window.renderDataGrid = (category) => {
        const gridContainer = document.getElementById('dataGridContainer');
        gridContainer.innerHTML = "";
        document.getElementById('inp_plan').value = "";
        document.getElementById('inp_plan_price').value = "";
        
        let matchedPlans = 0;

        window.allFetchedPlans.forEach(p => {
            const name = p.name || p.title || "Data Plan";
            const price = p.amount || 0;
            const code = p.plan_code || p.id || "";
            const nUpper = name.toUpperCase();

            let match = false;
            if (category === "ALL") match = true;
            else if (category === "SME" && nUpper.includes("SME")) match = true;
            else if (category === "CG" && (nUpper.includes("CG") || nUpper.includes("CORPORATE"))) match = true;
            else if (category === "GIFTING" && (nUpper.includes("GIFTING") || nUpper.includes("DIRECT") || (!nUpper.includes("SME") && !nUpper.includes("CG") && !nUpper.includes("CORPORATE")))) match = true;

            if (match && code) {
                matchedPlans++;
                gridContainer.innerHTML += `
                    <div class="col-6 col-md-4">
                        <div class="plan-card text-center p-2" onclick="window.selectPlan('${code}', ${price}, this)">
                            <div style="font-size:0.8rem; font-weight:700; color:#334155; margin-bottom:5px;">${name}</div>
                            <div style="font-size:1.1rem; font-weight:900; color:#047857;">₦${price}</div>
                        </div>
                    </div>
                `;
            }
        });

        if(matchedPlans === 0) {
             gridContainer.innerHTML = `<div class='col-12 text-center text-muted py-3'>No plans found in this category.</div>`;
        }
    };

    window.handleSmsExcel = (input) => {
        const file = input.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});
            let phones = [];
            rows.forEach(row => {
                row.forEach(cell => {
                    if(cell) {
                        let str = String(cell).replace(/\D/g, '');
                        if(str.length >= 10 && str.length <= 14) phones.push(str);
                    }
                });
            });
            const existing = document.getElementById('inp_phone').value;
            document.getElementById('inp_phone').value = existing ? existing + ',' + phones.join(',') : phones.join(',');
            window.calcSmsCost();
            alert(`Extracted ${phones.length} valid phone numbers!`);
        };
        reader.readAsArrayBuffer(file);
    };

    window.calcSmsCost = () => {
        const phonesStr = document.getElementById('inp_phone').value;
        const msgStr = document.getElementById('inp_message').value;
        const count = phonesStr.split(',').filter(p => p.trim().length > 0).length;
        const pages = Math.ceil(msgStr.length / 160) || 1;
        const cost = count * pages * 6; 
        document.getElementById('smsCostPreview').innerText = `Cost: ₦${cost.toLocaleString()} (${count} numbers, ${pages} pages)`;
        return cost;
    };

    window.validateMeterOrTV = async () => {
        const type = window.activeService.type;
        const btn = document.getElementById('procBtn');
        const payload = { type, account: document.getElementById('inp_account').value, service: document.getElementById('inp_service').value };
        
        if(!payload.account || !payload.service) return alert("Fill all details.");

        if(type === 'power') {
            payload.meter_type = document.getElementById('inp_meter_type').value;
            payload.amount = document.getElementById('inp_amount').value;
        } else {
            const planEl = document.getElementById('inp_plan');
            if(!planEl.value) return alert("Select a Bouquet.");
            payload.plan_id = planEl.value;
        }

        btn.disabled = true; btn.innerHTML = "Validating...";
        document.getElementById('srvLoader').style.display = "block";

        try {
            const res = await fetch(`${RENDER_URL}/api/validate`, {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
            });
            const out = await res.json();
            document.getElementById('srvLoader').style.display = "none";

            if (out.success) {
                const custName = out.data?.message?.details?.customer_name || out.data?.message?.details?.name || out.data?.data?.message?.details?.customer_name || "Verified";
                window.activeService.customer_name = custName;
                document.getElementById('srvExtra').innerHTML = `<div class="alert alert-success fw-bold text-center border-2 border-success">Verified: ${custName}</div>`;
                btn.innerText = "Pay Now";
                btn.disabled = false;
                btn.onclick = () => window.executeTransaction();
            } else {
                alert("Validation Failed: " + out.message);
                btn.disabled = false; btn.innerText = "Validate";
            }
        } catch(e) { alert("Network Error."); btn.disabled = false; document.getElementById('srvLoader').style.display = "none";}
    };

    window.executeTransaction = async () => {
        const uid = auth.currentUser.uid;
        const type = window.activeService.type;
        const btn = document.getElementById('procBtn');
        const payload = { uid, type, customer_name: window.activeService.customer_name };
        let costAmount = 0;

        if (type === 'data' || type === 'smile') {
            const planCode = document.getElementById('inp_plan').value;
            const planPrice = document.getElementById('inp_plan_price').value;
            
            if(!planCode) return alert("Please select a data plan from the grid.");
            
            payload.network = document.getElementById('inp_network').value;
            payload.plan = planCode;
            payload.phone = document.getElementById('inp_phone').value;
            costAmount = parseFloat(planPrice) + 10; 
        } 
        else if (type === 'airtime' || type === 'airtime_cash') {
            payload.network = document.getElementById('inp_network').value;
            payload.phone = document.getElementById('inp_phone').value;
            payload.amount = document.getElementById('inp_amount').value;
            costAmount = type === 'airtime' ? parseFloat(payload.amount) : 0;
        }
        else if (type === 'tv') {
            const p = document.getElementById('inp_plan');
            payload.service = document.getElementById('inp_service').value;
            payload.plan_id = p.value;
            payload.account = document.getElementById('inp_account').value;
            payload.phone = document.getElementById('inp_phone').value;
            costAmount = parseFloat(p.options[p.selectedIndex].getAttribute('data-price')) + 30; 
        }
        else if (type === 'power') {
            payload.service = document.getElementById('inp_service').value;
            payload.meter_number = document.getElementById('inp_account').value;
            payload.meter_type = document.getElementById('inp_meter_type').value;
            payload.amount = document.getElementById('inp_amount').value;
            payload.phone = document.getElementById('inp_phone').value;
            costAmount = parseFloat(payload.amount) + 50; 
        }
        else if (type === 'exam') {
            const examSelect = document.getElementById('inp_exam_id');
            const selectedOption = examSelect.options[examSelect.selectedIndex];
            if (!examSelect.value) return alert("Please select an exam type");
            
            payload.exam_id = examSelect.value;
            payload.qty = document.getElementById('inp_qty').value;
            const unitPrice = parseFloat(selectedOption?.getAttribute('data-price') || 0);
            costAmount = (unitPrice * parseFloat(payload.qty)) + 50;
        }
        else if (type === 'sms') {
            payload.sender_id = document.getElementById('inp_sender').value || "Update";
            payload.phone = document.getElementById('inp_phone').value;
            payload.message = document.getElementById('inp_message').value;
            costAmount = window.calcSmsCost(); 
        }
        else if (type === 'recharge_card') {
            payload.network = document.getElementById('card_network').value;
            payload.amount = document.getElementById('card_amount').value;
            payload.quantity = document.getElementById('card_quantity').value;
            costAmount = (parseFloat(payload.amount) * parseInt(payload.quantity)) + 50;
        }
        // 🌟 HUMANITY TRUST SERVICES 🌟
        else if (type.startsWith('nin')) {
            payload.nin = document.getElementById('inp_kyc_num').value;
            if(!payload.nin) return alert(`Enter a valid NIN number.`);
            costAmount = 150;
        }
        else if (type === 'bvn') {
            payload.bvn = document.getElementById('inp_kyc_num').value;
            if(!payload.bvn) return alert(`Enter a valid BVN number.`);
            costAmount = 150;
        }
        else if (type === 'demographic') {
            payload.surname = document.getElementById('demo_surname').value;
            payload.first_name = document.getElementById('demo_firstname').value;
            payload.birth_date = document.getElementById('demo_dob').value;
            payload.gender = document.getElementById('demo_gender').value;
            costAmount = 200;
        }
        else if (type === 'nin_phone' || type === 'bvn_phone') {
            payload.phone = document.getElementById('inp_phone_num').value;
            costAmount = 150;
        }
        else if (type === 'instant_validation') {
            payload.value = document.getElementById('inp_value').value;
            costAmount = 180;
        }
        // 🌟 USD CARDS 🌟
        else if (type === 'usd_card') {
            payload.brand = document.getElementById('card_brand').value;
            payload.amount = document.getElementById('card_amount').value;
            costAmount = parseFloat(payload.amount) * 1600; 
        }

        payload.costAmount = costAmount; 
        if(!confirm(`You will be charged ₦${costAmount.toLocaleString()}. Proceed?`)) return;

        btn.disabled = true; btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Processing...`;
        document.getElementById('srvLoader').style.display = "block";

        try {
            const res = await fetch(`${RENDER_URL}/api/process`, {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
            });
            const out = await res.json();
            document.getElementById('srvLoader').style.display = "none";
            
            if(out.success) {
                document.getElementById('srvExtra').innerHTML = `<div class="alert alert-success text-center fw-bold"><i class="fas fa-check-circle fa-2x"></i><br>Success!</div>`;
                btn.style.display = "none"; 
                setTimeout(() => location.reload(), 2000);
            } else {
                alert(out.message);
                btn.disabled = false; btn.innerText = "Try Again";
            }
        } catch(e) { 
            alert("Network Error."); 
            btn.disabled = false; btn.innerText = "Process"; 
            document.getElementById('srvLoader').style.display = "none";
        }
    };

    };

    const logout = () => signOut(auth).then(() => window.location.href="login.html");
    document.getElementById('btn-logout').onclick = logout;
    document.getElementById('btn-logout-mobile').onclick = logout;
</script>
</body>
</html>
