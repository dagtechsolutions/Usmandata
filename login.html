<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Usman Data Sub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .auth-card { max-width: 450px; margin: 80px auto; border-radius: 28px; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; background: white; overflow: hidden; }
        .auth-header { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); color: white; padding: 30px; text-align: center; }
        .auth-header h2 { font-weight: 800; letter-spacing: -0.5px; }
        .auth-body { padding: 30px; }
        .form-control { border-radius: 12px; padding: 12px 16px; border: 2px solid #e2e8f0; }
        .form-control:focus { border-color: #047857; box-shadow: none; }
        .btn-primary { background: #047857; border: none; border-radius: 50px; padding: 12px; font-weight: 700; transition: 0.3s; }
        .btn-primary:hover { background: #065f46; transform: translateY(-2px); }
        .language-selector { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .language-selector select { padding: 8px 16px; border-radius: 30px; border: 1px solid #e2e8f0; background: white; font-weight: 500; }
    </style>
</head>
<body>

<div class="language-selector">
    <select id="langSwitcher" class="form-select">
        <option value="en">English</option>
        <option value="ha">Hausa</option>
    </select>
</div>

<div class="container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-bolt text-warning fa-2x mb-2"></i>
            <h2 id="title">WELCOME BACK</h2>
            <p class="opacity-75 mb-0" id="subtitle">Login to your dashboard</p>
        </div>
        <div class="auth-body">
            <div class="mb-3">
                <label class="form-label fw-bold" id="emailLabel">Email Address</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="name@example.com">
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold" id="passLabel">Password</label>
                <input type="password" id="loginPass" class="form-control" placeholder="Enter your password">
            </div>
            <button class="btn btn-primary w-100 py-2 mb-3 fw-bold" id="btn-login" onclick="handleLogin()">
                <i class="fas fa-sign-in-alt me-2"></i><span id="loginBtnText">Login</span>
            </button>
            <div class="text-center">
                <span id="noAccountText">Don't have an account?</span>
                <a href="register.html" class="text-decoration-none fw-bold" style="color: #047857;" id="registerLink">Register here</a>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAmJIfWsqFVHyP-F3W85u4UbbxANMQaOTw",
        authDomain: "usmandatasub-7f93c.firebaseapp.com",
        projectId: "usmandatasub-7f93c",
        storageBucket: "usmandatasub-7f93c.firebasestorage.app",
        messagingSenderId: "133797152161",
        appId: "1:133797152161:web:18ac35c888c901695377e0",
        databaseURL: "https://usmandatasub-7f93c-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const translations = {
        en: { title: "WELCOME BACK", subtitle: "Login to your dashboard", emailLabel: "Email Address", passLabel: "Password", loginBtnText: "Login", noAccountText: "Don't have an account?", registerLink: "Register here" },
        ha: { title: "MARHABA DA DAWOWA", subtitle: "Shiga zuwa dashboard ɗin ku", emailLabel: "Adireshin Imel", passLabel: "Kalmar Sirri", loginBtnText: "Shiga", noAccountText: "Ba ku da asusu?", registerLink: "Yi rajista a nan" }
    };

    const langSwitcher = document.getElementById('langSwitcher');
    function updateLanguage(lang) {
        const t = translations[lang];
        if (!t) return;
        document.getElementById('title').innerText = t.title;
        document.getElementById('subtitle').innerText = t.subtitle;
        document.getElementById('emailLabel').innerText = t.emailLabel;
        document.getElementById('passLabel').innerText = t.passLabel;
        document.getElementById('loginBtnText').innerText = t.loginBtnText;
        document.getElementById('noAccountText').innerText = t.noAccountText;
        document.getElementById('registerLink').innerText = t.registerLink;
    }
    langSwitcher.addEventListener('change', (e) => updateLanguage(e.target.value));
    updateLanguage('en');

    window.handleLogin = async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPass').value;
        const btn = document.getElementById('btn-login');
        const btnText = document.getElementById('loginBtnText');

        if (!email || !pass) return alert("Please enter email and password.");

        const originalText = btnText.innerText;
        btnText.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Authenticating...';
        btn.disabled = true;

        try {
            await signInWithEmailAndPassword(auth, email, pass);
            window.location.href = "dashboard.html";
        } catch (error) {
            alert("Login Failed: " + error.message);
            btnText.innerText = originalText;
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
