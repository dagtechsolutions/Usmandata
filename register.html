<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Usman Data Sub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .auth-card { max-width: 500px; margin: 50px auto; border-radius: 28px; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; background: white; overflow: hidden; }
        .auth-header { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); color: white; padding: 30px; text-align: center; }
        .auth-header h2 { font-weight: 800; letter-spacing: -0.5px; }
        .auth-body { padding: 30px; }
        .form-control { border-radius: 12px; padding: 12px 16px; border: 2px solid #e2e8f0; }
        .form-control:focus { border-color: #047857; box-shadow: none; }
        .btn-primary { background: #047857; border: none; border-radius: 50px; padding: 12px; font-weight: 700; transition: 0.3s; }
        .btn-primary:hover { background: #065f46; transform: translateY(-2px); }
        .alert-info { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 16px; color: #1e40af; font-size: 0.85rem; }
        .language-selector { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .language-selector select { padding: 8px 16px; border-radius: 30px; border: 1px solid #e2e8f0; background: white; font-weight: 500; }
    </style>
</head>
<body>

<div class="language-selector">
    <select id="langSwitcher" class="form-select">
        <option value="en">English</option>
        <option value="ha">Hausa</option>
    </select>
</div>

<div class="container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-bolt text-warning fa-2x mb-2"></i>
            <h2 id="title">USMAN DATA</h2>
            <p class="opacity-75 mb-0" id="subtitle">Create your Agent Account</p>
        </div>
        <div class="auth-body">
            <div class="alert-info p-3 mb-4 rounded-3" id="notice">
                <i class="fas fa-shield-alt me-2"></i>
                <strong id="noticeTitle">Important Notice:</strong><br>
                <span id="noticeText">Use your EXACT REAL NAME as on BVN/NIN. Password cannot be recovered!</span>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold" id="nameLabel">Full Name (As on BVN/NIN)</label>
                <input type="text" id="regName" class="form-control" placeholder="Musa Ibrahim">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold" id="emailLabel">Email Address</label>
                <input type="email" id="regEmail" class="form-control" placeholder="name@example.com">
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold" id="passLabel">Password (Irrecoverable)</label>
                <input type="password" id="regPass" class="form-control" placeholder="Minimum 6 characters">
            </div>
            <button class="btn btn-primary w-100 py-2 mb-3 fw-bold" id="btn-reg" onclick="handleRegister()">
                <i class="fas fa-user-plus me-2"></i><span id="registerBtnText">Register</span>
            </button>
            <div class="text-center">
                <span id="haveAccountText">Already have an account?</span>
                <a href="login.html" class="text-decoration-none fw-bold" style="color: #047857;" id="loginLink">Login here</a>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAmJIfWsqFVHyP-F3W85u4UbbxANMQaOTw",
        authDomain: "usmandatasub-7f93c.firebaseapp.com",
        projectId: "usmandatasub-7f93c",
        storageBucket: "usmandatasub-7f93c.firebasestorage.app",
        messagingSenderId: "133797152161",
        appId: "1:133797152161:web:18ac35c888c901695377e0",
        databaseURL: "https://usmandatasub-7f93c-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const translations = {
        en: {
            title: "USMAN DATA", subtitle: "Create your Agent Account",
            noticeTitle: "Important Notice:", noticeText: "Use your EXACT REAL NAME as on BVN/NIN. Password cannot be recovered!",
            nameLabel: "Full Name (As on BVN/NIN)", emailLabel: "Email Address", passLabel: "Password (Irrecoverable)",
            registerBtnText: "Register", haveAccountText: "Already have an account?", loginLink: "Login here"
        },
        ha: {
            title: "USMAN DATA", subtitle: "Ƙirƙiri Asusun Wakili",
            noticeTitle: "Muhimmin Sanarwa:", noticeText: "Yi amfani da AIN SUNAN ku daidai kamar yadda yake akan BVN/NIN. Kalmar sirri ba za a iya dawo da ita ba!",
            nameLabel: "Cikakken Suna (Kamar yadda yake akan BVN/NIN)", emailLabel: "Adireshin Imel", passLabel: "Kalmar Sirri (Ba za a iya dawo da ita ba)",
            registerBtnText: "Yi Rajista", haveAccountText: "Kuna da asusu?", loginLink: "Shiga nan"
        }
    };

    const langSwitcher = document.getElementById('langSwitcher');
    function updateLanguage(lang) {
        const t = translations[lang];
        if (!t) return;
        document.getElementById('title').innerText = t.title;
        document.getElementById('subtitle').innerText = t.subtitle;
        document.getElementById('noticeTitle').innerHTML = t.noticeTitle;
        document.getElementById('noticeText').innerHTML = t.noticeText;
        document.getElementById('nameLabel').innerText = t.nameLabel;
        document.getElementById('emailLabel').innerText = t.emailLabel;
        document.getElementById('passLabel').innerText = t.passLabel;
        document.getElementById('registerBtnText').innerText = t.registerBtnText;
        document.getElementById('haveAccountText').innerText = t.haveAccountText;
        document.getElementById('loginLink').innerText = t.loginLink;
    }
    langSwitcher.addEventListener('change', (e) => updateLanguage(e.target.value));
    updateLanguage('en');

    window.handleRegister = async () => {
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const pass = document.getElementById('regPass').value;
        const btn = document.getElementById('btn-reg');
        const btnText = document.getElementById('registerBtnText');

        if (!name || !email || pass.length < 6) {
            alert("Please fill all fields. Password must be at least 6 characters.");
            return;
        }

        const originalText = btnText.innerText;
        btnText.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Creating Account...';
        btn.disabled = true;

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
            const user = userCredential.user;

            await set(ref(db, 'users/' + user.uid), {
                fullName: name,
                email: email,
                balance: 0,
                role: "agent",
                createdAt: new Date().toISOString()
            });

            alert("Registration successful!");
            window.location.href = "dashboard.html";
        } catch (error) {
            alert("Error: " + error.message);
            btnText.innerText = originalText;
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
