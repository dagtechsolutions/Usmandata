<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Usman Data Sub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Added FontAwesome for icons and spinners -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; }
        .auth-card { max-width: 400px; margin: 40px auto; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #004a99; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card auth-card p-4">
        <div class="text-center mb-3">
            <h2 class="fw-bold text-primary">USMAN DATA</h2>
            <p id="reg-title" class="text-muted">Create your Agent Account</p>
        </div>

        <!-- NEW: CRITICAL WARNING ALERT -->
        <div class="alert alert-warning text-center" style="font-size: 0.85rem; padding: 10px;">
            <i class="fas fa-exclamation-triangle text-danger" style="font-size: 1.2rem;"></i><br>
            <b>CRITICAL NOTICE:</b><br>
            Please use your <b>EXACT REAL NAME</b> as it appears on your BVN or NIN (required for account funding later).<br><br>
            Please use a <b>Password you will remember</b> as passwords are irrecoverable!
        </div>

        <div class="mb-3">
            <label id="lbl-name" class="form-label fw-bold">Full Name (As on BVN/NIN)</label>
            <input type="text" id="regName" class="form-control" placeholder="Musa Ibrahim">
        </div>
        <div class="mb-3">
            <label id="lbl-email" class="form-label fw-bold">Email Address</label>
            <input type="email" id="regEmail" class="form-control" placeholder="name@example.com">
        </div>
        <div class="mb-3">
            <label id="lbl-pass" class="form-label fw-bold">Password (Irrecoverable)</label>
            <input type="password" id="regPass" class="form-control" placeholder="Min 6 characters">
        </div>
        
        <button class="btn btn-primary w-100 py-2 mb-3 fw-bold" onclick="handleRegister()" id="btn-reg">
            Register / Yi Rajista
        </button>
        
        <div class="text-center">
            <span id="txt-footer">Already have an account?</span> 
            <a href="login.html" class="text-decoration-none fw-bold" id="link-login">Login here</a>
        </div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
      apiKey: "AIzaSyAmJIfWsqFVHyP-F3W85u4UbbxANMQaOTw",
      authDomain: "usmandatasub-7f93c.firebaseapp.com",
      projectId: "usmandatasub-7f93c",
      storageBucket: "usmandatasub-7f93c.firebasestorage.app",
      messagingSenderId: "133797152161",
      appId: "1:133797152161:web:18ac35c888c901695377e0",
      databaseURL: "https://usmandatasub-7f93c-default-rtdb.firebaseio.com" 
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  window.handleRegister = async () => {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPass').value;
    
    const btn = document.getElementById('btn-reg');

    if(!name || !email || pass.length < 6) {
        alert("Please fill all fields. Password must be at least 6 characters.");
        return;
    }

    // Disable button and show spinner
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
    btn.disabled = true;

    try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
        const user = userCredential.user;

        // Create User Wallet in Database
        await set(ref(db, 'users/' + user.uid), {
            fullName: name,
            email: email,
            balance: 0,
            role: "agent",
            createdAt: new Date().toISOString()
        });

        alert("Success! Barka da zuwa.");
        window.location.href = "dashboard.html";
    } catch (error) {
        alert("Error: " + error.message);
        // Restore button if it fails
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
  };
</script>
</body>
</html>
